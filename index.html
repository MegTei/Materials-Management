<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

  content="default-src 'self';

    connect-src https://*.supabase.co wss://*.supabase.co https://api.emailjs.com;
    style-src 'self' 'unsafe-inline';
    img-src 'self' data: blob:;
    font-src 'self' data:;
    worker-src blob:;
    object-src 'none';">
<title>Materials Management - Australian Open</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0eff0;color:#1a1a1a;font-size:15px;line-height:1.5}
.app{max-width:700px;margin:0 auto;padding:0 0 5rem}

/* ── Highlighted header bar ─────────────────────────────────────────────── */
.ao-hdr-wrap{background:linear-gradient(135deg,#0A2240 0%,#0F3460 60%,#185FA5 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.ao-hdr-accent{height:4px;background:linear-gradient(90deg,#1D9E75 0%,#378ADD 50%,#1D9E75 100%)}
.ao-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;max-width:700px;margin:0 auto}
.ao-hdr-left{display:flex;align-items:center;gap:12px}
.ao-logo-mark{display:flex;gap:3px;align-items:center}
.ao-logo-mark span{display:block;width:6px;border-radius:2px;background:#1D9E75}
.ao-org{font-size:10px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:2px}
.ao-ttl{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.01em}
.ao-tag{font-size:10px;padding:3px 10px;border-radius:99px;background:rgba(29,158,117,.25);border:1px solid rgba(29,158,117,.5);color:#5DECBA;font-weight:700;letter-spacing:.04em}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}

/* ── Content wrapper ────────────────────────────────────────────────────── */
.page-body{padding:1.25rem 1rem 2rem}
.prog-segs{display:flex;gap:4px;margin-bottom:5px}
.seg{flex:1;height:3px;border-radius:2px;background:#e0ddd6;transition:background .3s}
.seg.done{background:#1D9E75}.seg.active{background:#378ADD}
.prog-lbls{display:flex;margin-bottom:1.25rem}
.plbl{flex:1;text-align:center;font-size:11px;color:#aaa}
.plbl.active{color:#185FA5;font-weight:700}.plbl.done{color:#1D9E75}
.card{background:#fff;border:1px solid #e8e5de;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.g3{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:10px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.fhint{font-size:11px;color:#aaa;margin-top:2px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#378ADD}
textarea{resize:vertical}
button{padding:8px 16px;border:1px solid #ccc;border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;cursor:pointer;transition:background .15s,border-color .15s}
button:hover{background:#f5f5f3;border-color:#aaa}
button:active{background:#eee}

/* Asset cards */
.acard{background:#fff;border:1px solid #e8e5de;border-radius:10px;margin-bottom:10px;overflow:hidden}
.acard-hd{display:flex;align-items:center;gap:7px;padding:10px 13px;cursor:pointer;transition:background .15s}
.acard-hd:hover{background:#f9f8f6}
.acard-bd{padding:14px 14px 8px;border-top:1px solid #e8e5de;background:#f9f8f6;border-left:3px solid #185FA5}
.aref{font-size:11px;color:#aaa;font-weight:700;flex-shrink:0}
.aname{flex:1;font-size:13px;font-weight:600;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

/* Material rows within asset */
.mat-row{background:#fff;border:1px solid #d4dff0;border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.mat-row-hd{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.mat-row-num{font-size:10px;font-weight:700;color:#185FA5;background:#E6F1FB;padding:2px 7px;border-radius:4px;flex-shrink:0}
.mat-row-name{flex:1;font-size:12px;color:#888;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Mats section divider inside asset */
.mats-divider{display:flex;align-items:center;justify-content:space-between;margin:12px 0 8px;padding-top:10px;border-top:1px dashed #ddd}
.mats-divider-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;color:#888;text-transform:uppercase}
.btn-add-mat{font-size:11px;padding:4px 10px;color:#185FA5;border-color:rgba(24,95,165,.3);background:#E6F1FB}
.btn-add-mat:hover{background:#d4e8f7;border-color:#185FA5}

.bdg{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap;flex-shrink:0}
.tl{background:#E1F5EE;color:#0F6E56}.gr{background:#EAF3DE;color:#3B6D11}.bl{background:#E6F1FB;color:#185FA5}
.am{background:#FAEEDA;color:#854F0B}.re{background:#FCEBEB;color:#A32D2D}.gy{background:#F1EFE8;color:#5F5E5A}.pu{background:#EEEDFE;color:#3C3489}
.strack{height:7px;border-radius:4px;background:#e8e5de;overflow:hidden}
.sfill{height:100%;border-radius:4px;transition:width .5s}
.metg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:.75rem 0}
.met{background:#f5f5f3;border-radius:8px;padding:12px;text-align:center}
.mval{font-size:22px;font-weight:600}.mlbl{font-size:11px;color:#888;margin-top:2px;line-height:1.3}
.pitem{display:flex;align-items:center;gap:10px;padding:12px 1.25rem;background:#fff;border:1px solid #e8e5de;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.pitem:hover{border-color:#bbb}
.pav{width:34px;height:34px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#0F6E56;flex-shrink:0}
.srow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #e8e5de;font-size:13px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sechd{font-size:11px;font-weight:800;color:#0A2240;margin:2rem 0 .75rem;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.1em}
.sechd::before{content:'';display:block;width:4px;height:18px;border-radius:2px;background:linear-gradient(180deg,#185FA5,#1D9E75);flex-shrink:0}
.sechd-first{margin-top:.25rem}
.hbox{background:#EEF5FF;border:1px solid #c5daf5;border-radius:8px;padding:11px 13px;font-size:12.5px;color:#0A3A6B;margin-bottom:1rem;line-height:1.6}
.hbox a{color:#185FA5}
.acts{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e8e5de}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

/* TML info box */
.tml-info{border-radius:6px;padding:7px 10px;font-size:11.5px;line-height:1.5;margin:5px 0;display:flex;gap:8px;align-items:flex-start}
.tml-info-yes{background:#E1F5EE;color:#0F6E56;border:1px solid #b7e4d0}
.tml-info-no{background:#FCEBEB;color:#A32D2D;border:1px solid #f5c6c6}
.tml-info-maybe{background:#FAEEDA;color:#854F0B;border:1px solid #f5ddb7}
.tml-info-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.tml-ref-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(0,0,0,.07);margin-right:4px;letter-spacing:.03em;vertical-align:middle}
.name-sub-label{font-size:11px;color:#999;margin-top:5px;margin-bottom:2px;display:block}

/* Add asset CTA */
.add-asset-area{border:2px dashed #b8d0f0;border-radius:10px;padding:1.25rem;text-align:center;margin-bottom:14px;background:#f8fbff}
.add-asset-area p{font-size:12px;color:#999;margin-bottom:10px;line-height:1.5}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700;border-radius:8px}
.btn-primary:hover{background:#1a6bbf;border-color:#1a6bbf}

/* Summary mat list */
.smat-list{padding:6px 0 2px}
.smat-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:#555}
.smat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#94a3b8}

/* Target materials list boxes */
.tbox{display:flex;border-radius:7px;overflow:hidden;margin-bottom:8px}
.tbar{width:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.ttxt{color:#fff;font-size:7.5px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;writing-mode:vertical-rl;transform:rotate(180deg)}
.ti{padding:11px 14px;flex:1}
.tgt{font-size:11.5px;font-weight:700;margin-bottom:2px;color:#185FA5}
.tgi{font-size:11px;color:#333;line-height:1.7}
.tcname{font-size:12px;font-weight:600;color:#222}
.tcnote{font-size:11px;color:#666;padding-left:16px}

/* ── Spectrum / hierarchy diagram ─────────────────────────────────────────── */
.sp-wrap{position:relative;width:100%;height:calc(7 * 72px);overflow:hidden;background:white;flex-shrink:0}
.sp-band{position:absolute;left:0;width:76.5%;height:calc(100% / 7);z-index:1}
.sp-band:nth-child(1){top:calc(0 * 100% / 7);background:#071545}
.sp-band:nth-child(2){top:calc(1 * 100% / 7);background:#282f8d}
.sp-band:nth-child(3){top:calc(2 * 100% / 7);background:#1199cc}
.sp-band:nth-child(4){top:calc(3 * 100% / 7);background:#11d4e4}
.sp-band:nth-child(5){top:calc(4 * 100% / 7);background:#86d9eb}
.sp-band:nth-child(6){top:calc(5 * 100% / 7);background:#cceef5}
.sp-band:nth-child(7){top:calc(6 * 100% / 7);background:#d8ff00}
.sp-wedge{position:absolute;inset:0;background:#f8f7f5;clip-path:polygon(76.5% 0,100% 0,100% 100%,0 100%);z-index:2}
.sp-axis{position:absolute;left:76.5%;width:2px;transform:translateX(-50%);z-index:5}
.sp-axis.des{top:0;height:calc(3 * 100% / 7);background:#0798c7}
.sp-axis.rml{top:calc(3 * 100% / 7);height:calc(1 * 100% / 7);background:#11D4E4}
.sp-axis.circ{top:calc(4 * 100% / 7);height:calc(2 * 100% / 7);background:#86D9EB}
.sp-axis.dead{top:calc(6 * 100% / 7);height:calc(1 * 100% / 7);background:#c6d900}
.sp-arr:before,.sp-arr:after{content:"";position:absolute;left:50%;transform:translateX(-50%);border-left:4px solid transparent;border-right:4px solid transparent}
.sp-axis.des:before{top:-1px;border-bottom:8px solid #0798c7}.sp-axis.des:after{bottom:-1px;border-top:8px solid #0798c7}
.sp-axis.rml:before{top:-1px;border-bottom:7px solid #11D4E4}.sp-axis.rml:after{bottom:-1px;border-top:7px solid #11D4E4}
.sp-axis.circ:before{top:-1px;border-bottom:7px solid #86D9EB}.sp-axis.circ:after{bottom:-1px;border-top:7px solid #86D9EB}
.sp-axis.dead:before{top:-1px;border-bottom:7px solid #c6d900}.sp-axis.dead:after{bottom:-1px;border-top:7px solid #c6d900}
.sp-lbl{position:absolute;left:79%;z-index:6;font-weight:700;letter-spacing:.04em;line-height:1.2;font-family:Arial,Helvetica,sans-serif;display:flex;flex-direction:column;justify-content:center}
.sp-lbl.des{top:0;height:calc(3 * 100% / 7);font-size:11px;color:#0798c7}
.sp-lbl.rml{top:calc(3 * 100% / 7);height:calc(1 * 100% / 7);font-size:11px;color:#11D4E4;font-weight:800}
.sp-lbl.circ{top:calc(4 * 100% / 7);height:calc(2 * 100% / 7);font-size:11px;color:#86D9EB;font-weight:800;white-space:normal;line-height:1.2}
.sp-lbl.dead{top:calc(6 * 100% / 7);height:calc(1 * 100% / 7);font-size:11px;color:#c6d900}
.hr{display:flex;flex-direction:column;justify-content:center;padding-right:10px}
.hn{font-size:10px;font-weight:800}
.hl{font-size:13px;font-weight:700}
.hd{font-size:11.5px;color:#666;line-height:1.5;margin-top:2px}


/* ── Admin dashboard UX ───────────────────────────────────────────────────── */
.admin-hero{background:linear-gradient(135deg,#0A2240 0%,#0F3460 70%,#185FA5 100%);padding:1.5rem 1.25rem;color:#fff;margin:0 -1rem 0}
.admin-hero h2{font-size:20px;font-weight:800;margin-bottom:.4rem;letter-spacing:-.02em}
.admin-hero p{font-size:12px;line-height:1.6;opacity:.8}
.admin-section{background:#fff;margin:0 -1rem;padding:1.25rem 1rem;border-bottom:1px solid #e8e5de}
.admin-section.alt{background:#f8f7f5}
.insight-card{background:#fff;border:1px solid #e8e5de;border-radius:10px;padding:14px 16px}
.insight-label{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px}
.insight-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0ede8;font-size:12px}
.insight-row:last-child{border-bottom:none}
.insight-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.insight-bar-wrap{width:70px;height:5px;background:#e8e5de;border-radius:3px;overflow:hidden;flex-shrink:0}
.insight-bar{height:100%;border-radius:3px}
@media print{
  body{background:white;font-size:12px}
  .ao-hdr-wrap{position:static;box-shadow:none;background:#0A2240!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ao-hdr-accent{display:none}
  .tab-nav,#tab-nav,.acts,#hd-btns,.add-asset-area,.btn-add-mat,.del-btn,.cta-section,.plans-section,.purpose-hero .tag{display:none!important}
  .app{max-width:100%}
  .page-body{padding:0 1rem!important}
  .acard-bd{display:block!important;background:white!important}
  .card,.acard,.mat-row{break-inside:avoid;border:1px solid #ccc!important;box-shadow:none!important}
  .mat-row{background:#f9f9f9!important}
  .acard{margin-bottom:16px!important}
  .tml-info{border:1px solid #ccc!important}
  select,input,textarea{border:1px solid #ccc!important;background:white!important}
  .section-panel,.section-panel.alt{background:white!important;border:none!important;margin:0!important;padding:.5rem 0!important}
  h1,h2{page-break-after:avoid}
  .acard{page-break-inside:avoid}
}

/* Tab navigation */
.tab-nav{background:#fff;border-bottom:2px solid #e0ddd6;position:sticky;top:68px;z-index:90;box-shadow:0 1px 6px rgba(0,0,0,.06)}.tab-nav-inner{max-width:700px;margin:0 auto;display:flex;padding-left:1.25rem}
.tab-btn{padding:11px 16px;font-size:12px;font-weight:700;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;color:#888;border-radius:0;transition:color .15s,border-color .15s;letter-spacing:.02em}
.tab-btn:hover{color:#185FA5;background:none}
.tab-btn.active{color:#185FA5;border-bottom-color:#185FA5}

/* ── Home page rich content ─────────────────────────────────────────────── */
.purpose-hero{background:linear-gradient(135deg,#0A2240 0%,#0F3460 70%,#185FA5 100%);padding:1.75rem 1.25rem;color:#fff;margin:0 -1rem 0}
.purpose-hero h2{font-size:22px;font-weight:800;margin-bottom:.6rem;line-height:1.25;letter-spacing:-.02em}
.purpose-hero p{font-size:13px;line-height:1.75;opacity:.88;max-width:480px}
.purpose-hero .tag{display:inline-block;background:rgba(29,158,117,.25);border:1px solid rgba(29,158,117,.5);color:#5DECBA;padding:3px 11px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:.85rem;text-transform:uppercase}

.section-panel{background:#fff;margin:0 -1rem;padding:1.5rem 1rem;border-bottom:1px solid #e8e5de}
.section-panel.alt{background:#f8f7f5}

.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.25rem}
.why-card{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;padding:13px}
.why-card .icon{font-size:20px;margin-bottom:6px}
.why-card h4{font-size:12.5px;font-weight:700;color:#0A2240;margin-bottom:4px}
.why-card p{font-size:11.5px;color:#666;line-height:1.55}

.hierarchy{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;overflow:hidden;margin-bottom:.25rem}
.hier-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #ebe8e0;transition:background .15s}
.hier-row:hover{background:#f0eff0}
.hier-row:last-child{border-bottom:none}
.hier-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#fff}
.hier-lbl{font-size:13px;color:#0A2240;font-weight:600}
.hier-sub{font-size:11.5px;color:#777;margin-top:1px}

.resp-card{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;padding:13px 15px;margin-bottom:8px}
.resp-card h4{font-size:13px;font-weight:700;color:#0A2240;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.resp-card p{font-size:12.5px;color:#555;line-height:1.65}

.top3-row{display:flex;gap:8px;margin-bottom:.25rem}
.top3-item{flex:1;background:linear-gradient(160deg,#0A2240 0%,#185FA5 100%);border:none;border-radius:12px;padding:14px 10px;text-align:center;position:relative;overflow:hidden}
.top3-item::after{content:'';position:absolute;inset:0;background:radial-gradient(circle at 80% 20%,rgba(255,255,255,.12) 0%,transparent 60%);pointer-events:none}
.top3-item .num{font-size:26px;font-weight:900;color:#fff;letter-spacing:-.02em;line-height:1}
.top3-item .rank-lbl{font-size:9px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:8px}
.top3-item .cat{font-size:11px;color:rgba(255,255,255,.85);margin-top:6px;line-height:1.4;font-weight:600}
.top3-item.hi{background:linear-gradient(160deg,#0A2240 0%,#185FA5 100%)}

/* How it works steps */
.how-steps{display:flex;flex-direction:column;gap:0;margin-bottom:.25rem}
.how-step{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-bottom:1px solid #ebe8e0}
.how-step:last-child{border-bottom:none}
.how-step-num{width:32px;height:32px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:1px}
.how-step-body h4{font-size:13px;font-weight:700;color:#0A2240;margin-bottom:3px}
.how-step-body p{font-size:12px;color:#666;line-height:1.55}

/* Plans section */
.plans-section{background:#fff;margin:0 -1rem;padding:1.25rem 1rem;border-bottom:1px solid #e8e5de}
.pitem{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .15s}
.pitem:hover{border-color:#185FA5;background:#EEF5FF}
.pav{width:36px;height:36px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0F6E56;flex-shrink:0}

/* CTA section */
.cta-section{background:linear-gradient(135deg,#EEF5FF 0%,#E6F4F1 100%);margin:0 -1rem;padding:1.75rem 1rem;border-bottom:1px solid #d4e8f0;text-align:center}
.cta-section h3{font-size:17px;font-weight:800;color:#0A2240;margin-bottom:.5rem;letter-spacing:-.02em}
.cta-section p{font-size:13px;color:#555;line-height:1.6;margin-bottom:1.25rem;max-width:400px;margin-left:auto;margin-right:auto}
.btn-cta{display:block;width:100%;padding:15px;font-size:15px;font-weight:800;border-radius:10px;background:linear-gradient(135deg,#185FA5,#0F4C8A);color:#fff;border:none;cursor:pointer;letter-spacing:.01em;box-shadow:0 4px 16px rgba(24,95,165,.3);transition:transform .15s,box-shadow .15s}
.btn-cta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(24,95,165,.4);background:linear-gradient(135deg,#185FA5,#0F4C8A)}
.btn-cta:active{transform:none}

/* FAQ accordion */
.faq-section{margin-bottom:1.5rem}
.faq-item{background:#fff;border:1px solid #e8e5de;border-radius:10px;margin-bottom:8px;overflow:hidden}
.faq-q{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;cursor:pointer;transition:background .15s}
.faq-q:hover{background:#f9f8f6}
.faq-q-text{flex:1;font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.4}
.faq-icon{font-size:16px;color:#aaa;flex-shrink:0;margin-top:1px;transition:transform .2s}
.faq-icon.open{transform:rotate(180deg)}
.faq-a{padding:0 14px 13px 38px;font-size:13px;color:#555;line-height:1.7;display:none}
.faq-a.open{display:block}
.faq-a strong{color:#1a1a1a}
.faq-tip{background:#E1F5EE;border-radius:6px;padding:7px 10px;font-size:12px;color:#0F6E56;margin-top:8px;font-weight:500}

/* Professional icon blocks */
.why-card .icon{width:36px;height:36px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;background:#EEF5FF;border-radius:8px;flex-shrink:0}
.why-card .icon svg{width:18px;height:18px;stroke:#185FA5;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.resp-card h4 .icon-wrap{width:28px;height:28px;background:#EEF5FF;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.resp-card h4 .icon-wrap svg{width:14px;height:14px;stroke:#185FA5;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Start plan link block */
.start-plan-cta{background:linear-gradient(135deg,#185FA5,#0F4C8A);border:none;border-radius:10px;padding:15px 18px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(24,95,165,.3)}
.start-plan-cta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(24,95,165,.4)}
.start-plan-cta:active{transform:none}
.start-plan-cta h4{font-size:15px;font-weight:800;color:#fff;margin-bottom:2px;letter-spacing:.01em}
.start-plan-cta p{font-size:12px;color:rgba(255,255,255,.75)}
.start-plan-arrow{font-size:20px;color:#185FA5;font-weight:700;flex-shrink:0}

/* How steps horizontal */
.how-steps-h{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.how-step-card{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;padding:14px 13px;position:relative}
.how-step-card .step-n{width:28px;height:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-bottom:10px}
.how-step-card h4{font-size:12px;font-weight:700;color:#0A2240;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3}
.how-step-card p{font-size:11px;color:#666;line-height:1.5}

/* Admin dashboard */
.admin-panel{padding:1.25rem 1rem}
.admin-login{background:#fff;border:1px solid #e8e5de;border-radius:12px;padding:2rem 1.5rem;max-width:340px;margin:2rem auto;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.admin-login h3{font-size:14px;font-weight:800;color:#0A2240;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.07em}
.admin-login p{font-size:12px;color:#888;margin-bottom:1rem}
.admin-table{width:100%;border-collapse:collapse;font-size:12px}
.admin-table th{background:#0A2240;color:#fff;padding:9px 10px;text-align:left;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase}
.admin-table td{padding:9px 10px;border-bottom:1px solid #e8e5de;color:#333;vertical-align:top}
.admin-table tr:hover td{background:#f5f8ff}
.admin-stat{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}

/* Audit trail */
.audit-log{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:8px;padding:10px 13px;margin-bottom:10px}
.audit-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0ede8;font-size:11.5px}
.audit-row:last-child{border-bottom:none}
.audit-dot{width:7px;height:7px;border-radius:50%;background:#185FA5;flex-shrink:0}
.audit-who{font-weight:600;color:#0A2240;min-width:100px}
.audit-what{color:#666;flex:1}
.audit-when{color:#aaa;font-size:10.5px;white-space:nowrap}
.import-zone{border:2px dashed #c5daf5;border-radius:10px;padding:1.25rem;text-align:center;background:#EEF5FF;margin-bottom:1rem;cursor:pointer;transition:border-color .2s}
.import-zone:hover{border-color:#185FA5}
.import-zone p{font-size:12px;color:#555;margin-top:.4rem}

.plan-id-badge{display:flex;align-items:center;gap:12px;background:#EEF9F4;border:2px solid #b2e8d2;border-radius:10px;padding:14px 16px;margin-top:10px}
.plan-id-code{font-family:monospace;font-size:17px;font-weight:800;color:#0A2240;letter-spacing:.08em;flex:1}
.plan-id-lbl{font-size:10px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.plan-id-copy-btn{background:#0F6E56;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.plan-id-copy-btn:hover{background:#0a5a47}
.retrieve-box{background:#fff;border:1.5px solid #e0ddd6;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.retrieve-box h4{font-size:12px;font-weight:800;color:#0A2240;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem}
.retrieve-box p{font-size:12px;color:#666;margin-bottom:.75rem;line-height:1.55}
.retrieve-row{display:flex;gap:8px}
.retrieve-row input{flex:1;font-family:monospace;font-size:14px;letter-spacing:.05em}
.retrieve-row button{white-space:nowrap;padding:8px 18px;background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700;border-radius:8px}
.backend-notice{background:#f8f7f5;border-left:3px solid #185FA5;padding:10px 14px;border-radius:0 8px 8px 0;font-size:12px;color:#555;line-height:1.6;margin-top:1rem}

/* ── Plan tab step layout ──────────────────────────────────────── */
.step-hd{display:flex;align-items:center;gap:10px;margin-bottom:1rem}
.step-num{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.step-hd-text{}
.step-hd-text .step-label{font-size:9px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.7;margin-bottom:1px}
.step-hd-text h3{font-size:17px;font-weight:800;letter-spacing:-.01em;margin:0}
.step-divider{display:flex;align-items:center;gap:10px;margin:0 -1rem;padding:.6rem 1rem;background:#e8e5de}
.step-divider .step-div-num{width:22px;height:22px;border-radius:50%;background:#888;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;color:#fff;flex-shrink:0}
.step-divider span{font-size:10px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:#888}

@keyframes spin{to{transform:rotate(360deg)}}

// ── Remote TML sync ───────────────────────────────────────────────────────────
// TML data is authoritative in the Materials_Methods_Plan repo as tml-data.json.
// On load we fetch the latest version, cache it for 24 h, and hot-swap the TML
// array in place — so all renderTMLInfo calls always use the freshest data.
// If the fetch fails (offline / CORS / missing file) the embedded array above
// is used silently as a fallback.
const TML_REMOTE_URL  = 'https://megtei.github.io/Materials_Methods_Plan/tml-data.json';
const TML_CACHE_KEY   = 'ao_tml_remote_cache';
const TML_CACHE_TTL   = 24 * 60 * 60 * 1000; // 24 hours in ms

async function syncRemoteTML(){
  try{
    // Check localStorage cache first
    const raw = localStorage.getItem(TML_CACHE_KEY);
    if(raw){
      const {ts, data} = JSON.parse(raw);
      if(Array.isArray(data) && data.length && Date.now()-ts < TML_CACHE_TTL){
        TML.splice(0, TML.length, ...data);
        return;
      }
    }
    // Fetch fresh copy
    const r = await fetch(TML_REMOTE_URL, {cache:'no-cache'});
    if(!r.ok) throw new Error('HTTP '+r.status);
    const data = await r.json();
    if(!Array.isArray(data) || !data.length) throw new Error('empty payload');
    TML.splice(0, TML.length, ...data);
    localStorage.setItem(TML_CACHE_KEY, JSON.stringify({ts:Date.now(), data}));
  } catch(e){
    // Silently fall back to embedded TML — no user-visible error
    console.info('TML remote sync skipped, using embedded data:', e.message);
  }
}

function planCode(id){

// ── Plan storage abstraction ──────────────────────────────────────────────────
// Swap this object's two methods to change the backend.
// localStorage is always used as an offline fallback.
const planDB = {
  async save(plan) {
    // Always save locally first (instant, offline-safe)
    storageSave(plan);

    if (!sb) {
      // Supabase not configured - localStorage only
      return { ok: true, source: 'local' };
    }
    try {
      const { error } = await sb.from('plans').upsert({
        id:         plan.id,
        plan_code:  planCode(plan.id),
        data:       plan,
        business:   plan.profile.businessName || '',
        owner:      plan.profile.ownerName    || '',
        role:       plan.profile.role         || '',
      }, { onConflict: 'id' });
      if (error) throw error;
      return { ok: true, source: 'cloud' };
    } catch(err) {
      console.warn('Supabase save failed, plan saved locally:', err.message);
      return { ok: true, source: 'local', warning: err.message };
    }
  },

  async loadById(code) {
    const normalised = code.trim().toUpperCase().replace(/\s/g,'');
    if (sb) {
      try {
        const { data, error } = await sb
          .from('plans')
          .select('data')
          .eq('plan_code', normalised)
          .single();
        if (data?.data) return data.data;
      } catch(err) {
        console.warn('Supabase lookup failed, trying local:', err.message);
      }
    }
    // Fallback to localStorage
    return findByCode(normalised);
  }
};

async function retrievePlan(){
  const inp=document.getElementById('retrieve-input');
  const msg=document.getElementById('retrieve-msg');
  const btn=document.querySelector('.retrieve-row button');
  if(!inp)return;
  const code=inp.value.trim().toUpperCase();
  if(code.length<9){
    if(msg){msg.textContent='Enter a full Plan ID (format: AO27-XXXX-XXXX)';msg.style.color='#A32D2D';}
    return;
  }
  if(msg){msg.textContent=SUPABASE_READY?'Searching cloud...':'Searching local plans...';msg.style.color='#888';}
  if(btn){btn.disabled=true;btn.textContent='Loading...';}
  try{
    const plan=await planDB.loadById(code);
    if(plan){
      S.plan=JSON.parse(JSON.stringify(plan));
      S.screen='form';S.plan.step=0;
      showToast('Plan loaded');render();
    } else {
      if(msg){
        msg.textContent=SUPABASE_READY
          ?'Plan not found in cloud or local storage. Check your Plan ID.'
          :'Plan not found on this device. Configure Supabase for cross-device access, or import your XLS.';
        msg.style.color='#A32D2D';
      }
    }
  } finally {
    if(btn){btn.disabled=false;btn.textContent='Load plan';}
  }
}


function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmtDate(ts){if(!ts)return'never';return new Date(ts).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}
function fmtAUDate(d){if(!d)return'-';const parts=d.split('-');if(parts.length===3)return parts[2]+'/'+parts[1]+'/'+parts[0];return d;}
function mkOpts(arr,val,ph){return(ph?`<option value="">${esc(ph)}</option>`:'')+arr.map(v=>`<option${v===val?' selected':''}>${esc(v)}</option>`).join('')}
function calcScore(assets){
  const allMats=(assets||[]).flatMap(a=>a.materials||[]);
  const f=allMats.filter(m=>m.stat);
  const lan=f.filter(m=>m.stat&&m.stat.toLowerCase().includes('landfill')).length;
  const tot=f.length;
  return{total:tot,landfill:lan,nonLandfill:tot-lan,pct:tot>0?Math.round((tot-lan)/tot*100):0};
}
// Per-asset circularity summary for header badge
function assetCirc(a){
  const withStat=(a.materials||[]).filter(m=>m.stat);
  if(!withStat.length)return'';
  const nonLan=withStat.filter(m=>!m.stat.toLowerCase().includes('landfill')).length;
  const cl=nonLan===withStat.length?'#1D9E75':nonLan===0?'#dc2626':'#EF9F27';
  return`<span style="font-size:10px;font-weight:700;color:${cl};flex-shrink:0">${nonLan}/${withStat.length}&nbsp;♻</span>`;
}
function fillClr(pct){return pct>=80?'#1D9E75':pct>=50?'#EF9F27':'#E24B4A'}
function statBdg(s){if(!s)return'';const m={'Reuse \u2013 Next AO (stored at AO)':'gr','Reuse \u2013 Next AO (stored by us)':'gr','Reuse \u2013 Other Event / Client':'tl','Recycle':'bl','Repurpose – use material in another way':'pu','Donate':'pu','Mixed construction waste \u2013 AO onsite bin':'re','Not sure yet':'gy','Other':'gy'};return`<span class="bdg ${m[s]||'gy'}">${esc(s)}</span>`}

function renderTMLOptions(selectedRef){
  const groups={};
  for(const t of TML){if(!groups[t.cat])groups[t.cat]=[];groups[t.cat].push(t)}
  let h='';
  for(const[cat,items]of Object.entries(groups)){
    h+=`<optgroup label="${esc(cat)}">`;
    for(const t of items){
      const icon=t.status==='yes'?'✓':t.status==='no'?'✗':'~';
      h+=`<option value="${esc(t.ref)}"${t.ref===selectedRef?' selected':''}>${icon} [${esc(t.ref)}] ${esc(t.name)}</option>`;
    }
    h+='</optgroup>';
  }
  return h;
}

function renderTMLInfo(ref){
  if(!ref||ref==='OTHER')return'';
  const t=TML.find(x=>x.ref===ref);
  if(!t)return'';
  const cls=t.status==='yes'?'tml-info-yes':t.status==='no'?'tml-info-no':'tml-info-maybe';
  const icon=t.status==='yes'?'♻':t.status==='no'?'⚠':'~';
  const recLabel=t.rec==='Yes'?'AO Recommended':t.rec==='No'?'Limit / Not Recommended':'Conditional / TBC';
  return`<div class="tml-info ${cls}"><span class="tml-info-icon">${icon}</span><div><strong><span class="tml-ref-badge">${esc(t.ref)}</span>${esc(recLabel)}</strong><br><span style="font-weight:600;opacity:.65;font-size:10.5px;text-transform:uppercase;letter-spacing:.04em">Circular:</span> ${esc(t.circ)}</div></div>`;
}

// Setup steps:
// 1. Create a free account at https://www.emailjs.com
// 2. Connect an email service (e.g. Gmail) → note the Service ID
// 3. Create a template with these variables:
//      {{to_name}}   – recipient's name
//      {{to_email}}  – recipient's email address
//      {{plan_id}}   – the AO plan reference code
//      {{action}}    – "created" or "updated"
//    Subject:  Your AO Materials Management Plan – {{plan_id}}
//    Body:
//      Hi {{to_name}},
//
//      Your AO Materials Management plan has been {{action}}.
//      {{plan_id}}
//
//      You can return to view and edit here https://megtei.github.io/Materials-Management/
// 4. Replace the three placeholder values below with your credentials
//    (found in EmailJS dashboard → Account → API Keys / Email Services / Email Templates)
const EMAILJS_PUBLIC_KEY  = 'YOUR_EMAILJS_PUBLIC_KEY';   // e.g. 'user_xxxxxxxxxxxx'
const EMAILJS_SERVICE_ID  = 'YOUR_EMAILJS_SERVICE_ID';   // e.g. 'service_xxxxxxx'
const EMAILJS_TEMPLATE_ID = 'YOUR_EMAILJS_TEMPLATE_ID';  // e.g. 'template_xxxxxxx'

const EMAILJS_READY = (
  EMAILJS_PUBLIC_KEY  !== 'YOUR_EMAILJS_PUBLIC_KEY' &&
  EMAILJS_SERVICE_ID  !== 'YOUR_EMAILJS_SERVICE_ID' &&
  EMAILJS_TEMPLATE_ID !== 'YOUR_EMAILJS_TEMPLATE_ID'
);

if(EMAILJS_READY && typeof emailjs !== 'undefined'){
  emailjs.init({publicKey: EMAILJS_PUBLIC_KEY});
}

async function sendPlanEmail(plan, isNew){
  if(!EMAILJS_READY){console.info('EmailJS not configured – skipping confirmation email.');return;}
  if(typeof emailjs === 'undefined'){console.warn('EmailJS library not loaded.');return;}
  const email = (plan.profile.email||'').trim();
  if(!email){return;} // no email address on file — skip silently
  const name   = plan.profile.ownerName || plan.profile.editorName || 'there';
  const code   = planCode(plan.id);
  const action = isNew ? 'created' : 'updated';
  try{
    await emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, {
      to_name : name,
      to_email: email,
      plan_id : code,
      action  : action
    });
    console.info('Plan email sent to', email);
  }catch(err){
    console.warn('EmailJS send failed:', err);
  }
}
function storageLoadAll(){
  try{
    const keys=Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX));
    const ps=keys.map(k=>{try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}).filter(Boolean);
    return ps.sort((a,b)=>(b.savedAt||0)-(a.savedAt||0));
  }catch(e){return[]}
}
function storageSave(plan){
  try{plan.savedAt=Date.now();localStorage.setItem(STORAGE_PREFIX+plan.id,JSON.stringify(plan));return true}catch(e){return false}
}
function storageDel(id){
  try{localStorage.removeItem(STORAGE_PREFIX+id);return true}catch(e){return false}
}

// Migrate old formats to current structure
function migratePlan(p){
  // Very old: plan.materials array
  if(!p.assets&&p.materials&&Array.isArray(p.materials)){
    p.assets=p.materials.map(m=>({
      id:m.id||uid(),expanded:false,prec:m.prec||'',precCustom:'',
      assetName:m.name||(m.cat?m.cat.split('(')[0].trim():'Asset'),desc:m.desc||'',
      materials:[{id:uid(),cat:m.cat||'',app:m.app||'',tmlRef:m.tmlRef||'',name:m.name||'',vol:m.vol||'',vunit:m.vunit||'sqm',stat:m.stat||'',outcome:m.outcome||''}]
    }));
    delete p.materials;
  }
  delete p.comments;
  // v4/v5: stat/outcome were on asset, migrate to each material
  if(p.assets){
    for(const a of p.assets){
      for(const m of(a.materials||[])){
        if(m.stat===undefined)m.stat=(a.stat||'');
        if(m.outcome===undefined)m.outcome=(a.outcome||'');
      }
      delete a.stat;delete a.outcome;
    }
  }
  return p;
}

    confirmLeaveIfUnsaved(()=>{S._unsaved=false;S.screen='home';switchTab(tab);});

async function loadAdminPlans(){
  if(sb){
    try{
      const{data,error}=await sb.from('plans').select('data,updated_at').order('updated_at',{ascending:false}).limit(300);
      if(error)throw error;
      if(data&&data.length){
        return data.map(row=>row.data).filter(Boolean);
      }
    }catch(err){
      console.warn('Supabase admin load failed, falling back to local:',err.message);
    }

  return storageLoadAll();

function exportAdminCSV(){
  loadAdminPlans().then(plans=>{
    if(!plans.length){showToast('No plans to export');return;}
  const rows=[['Business','Owner','Role','Email','Date Saved','Asset','Precinct','Material','TML Ref','Volume','Unit','Status','Outcome']];
  for(const p of plans){
    for(const a of (p.assets||[])){
      for(const m of (a.materials||[])){
        rows.push([
          p.profile.businessName||'',p.profile.ownerName||'',p.profile.role||'',p.profile.email||'',
          p.savedAt?new Date(p.savedAt).toLocaleDateString('en-AU'):'',
          a.assetName||'',
          a.prec||'',
          m.name||'',m.tmlRef||'',m.vol||'',m.vunit||'',m.stat||'',m.outcome||''
        ]);
      }
    }
  }
  const csv=rows.map(r=>r.map(v=>'"'+(String(v).replace(/"/g,'""'))+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='AO27_Materials_Plans.csv';a.click();
  URL.revokeObjectURL(url);
  });
}

function renderForm(){

function toggleDeptField(){
  const role=document.getElementById('p-role');
  const wrap=document.getElementById('p-dept-wrap');
  if(!role||!wrap)return;
  wrap.style.display=TA_ROLES.includes(role.value)?'':'none';
  if(!TA_ROLES.includes(role.value)){
    const dept=document.getElementById('p-dept');
    if(dept)dept.value='';
  }
}
function saveAbout(){
  const g=id=>{const e=document.getElementById(id);return e?e.value.trim():''};

  const roleVal=document.getElementById('p-role')?document.getElementById('p-role').value:'';
  const fields=[
    {id:'p-date',   label:'Date'},
    {id:'p-biz',    label:'Business name'},
    {id:'p-own',    label:'Plan owner / Contact'},
    {id:'p-email',  label:'Contact email'},
    {id:'p-role',   label:'Role in AO design & build'},
    {id:'p-editor', label:'Editor name'},
    {id:'p-waste',  label:'Waste reduction target'},
    {id:'p-reuse',  label:'Reuse target'},
    {id:'p-store',  label:'Storage details'},
    ...(TA_ROLES.includes(roleVal)?[{id:'p-dept',label:'Department'}]:[]),
  ];

  // Reset border colours
  fields.forEach(f=>{const el=document.getElementById(f.id);if(el)el.style.borderColor='';});

  // Find empty required fields
  const missing=[];
  fields.forEach(f=>{
    if(!g(f.id)){
      missing.push(f.label);
      const el=document.getElementById(f.id);if(el)el.style.borderColor='#dc2626';
    }
  });

  // Validate email format
  const emailVal=g('p-email');
  if(emailVal&&!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailVal)){
    if(!missing.find(m=>m==='Contact email'))missing.push('Contact email (please enter a valid address)');
    const el=document.getElementById('p-email');if(el)el.style.borderColor='#dc2626';
  }

  const errBox=document.getElementById('about-errors');
  if(missing.length){
    if(errBox){
      errBox.style.display='';
      errBox.innerHTML='<strong>Please complete all required fields before continuing:</strong>'
        +'<ul style="margin:.35rem 0 0 1.25rem;padding:0">'+missing.map(m=>'<li>'+m+'</li>').join('')+'</ul>';
      errBox.scrollIntoView({behavior:'smooth',block:'nearest'});
    }
    S.plan._aboutInvalid=true;
    return;
  }

  // Valid — clear errors and write values
  if(errBox)errBox.style.display='none';
  S.plan._aboutInvalid=false;
  const p=S.plan.profile;
  p.date=g('p-date');p.businessName=g('p-biz');p.ownerName=g('p-own');
  p.email=g('p-email');p.role=g('p-role');p.editorName=g('p-editor');
  p.wasteTarget=g('p-waste');p.reuseTarget=g('p-reuse');p.storageDetails=g('p-store');
  p.aoYear=g('p-aoyear');
  p.department=TA_ROLES.includes(p.role)?g('p-dept'):'';
}

function refreshAssets(){
  const el=document.getElementById('asset-list');if(!el)return;
  const assets=S.plan.assets||[];const sc=calcScore(assets);const cl=fillClr(sc.pct);
  let h='';
  if(assets.length>0){
    const allMatsCount=(assets||[]).flatMap(a=>a.materials||[]).length;
    h+=`<div id="score-bar" style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px"><span>${assets.length} asset${assets.length!==1?'s':''} &middot; ${allMatsCount} material${allMatsCount!==1?'s':''} &middot; ${sc.nonLandfill} diverted from landfill</span><span style="font-weight:600;color:${cl}">${sc.total>0?sc.pct+'% circular':''}</span></div><div class="strack"><div class="sfill" style="width:${sc.pct}%;background:${cl}"></div></div></div>`;
    for(let i=0;i<assets.length;i++)h+=assetCard(assets[i],i);
  }else{
    h=`<div style="text-align:center;padding:1.5rem 1rem;color:#888;font-size:13px">No assets added yet. Use the button below to add your first asset.</div>`;
  }
  el.innerHTML=h;
}

    <div class="acard-hd" onclick="toggleAsset('${a.id}')">

        <div class="fg">
          <label>1. AO Location / Precinct *</label>
          <input type="text" data-aid="${a.id}" data-f="prec" value="${esc(a.prec)}" placeholder="e.g. Garden Square, Rod Laver Arena, Show Courts…" onblur="upAsset(this)">
        </div>
        <div class="fg">
          <label>2. Asset / item name *</label>
          <input type="text" data-aid="${a.id}" data-f="assetName" value="${esc(a.assetName)}" placeholder="e.g. FOH Reception Desk, Marquee, Wayfinding Totems…" onblur="upAsset(this)">

      <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px;padding-top:10px;border-top:1px solid #e8e5de">

}

      <select data-aid="${aid}" data-mid="${m.id}" data-f="tmlRef" onchange="pickAssetMatTML(this)">

function stepSummary(plan){
  const p=plan.profile;const assets=plan.assets||[];const sc=calcScore(assets);const cl=fillClr(sc.pct);
  const allMats=assets.flatMap(a=>a.materials||[]);
  const stCts={};for(const m of allMats)if(m.stat)stCts[m.stat]=(stCts[m.stat]||0)+1;
  const stRows=Object.entries(stCts).sort((a,b)=>b[1]-a[1]).map(([s,n])=>'<div class="srow"><div class="sdot" style="background:'+(STCOL[s]||'#9ca3af')+'"></div><div style="flex:1;color:#1a1a1a">'+esc(s)+'</div><div style="font-weight:600;min-width:20px;text-align:right">'+n+'</div></div>').join('');
  const tmlMats=allMats.filter(m=>m.tmlRef&&m.tmlRef!=='OTHER');
  const customMats=allMats.filter(m=>!m.tmlRef||m.tmlRef==='OTHER');
  const flaggedAssets=assets.filter(a=>a.materials.some(m=>{if(!m.tmlRef||m.tmlRef==='OTHER')return false;const t=TML.find(x=>x.ref===m.tmlRef);return t&&t.status==='no';}));
  const flaggedBlock=flaggedAssets.length?'<div class="card"><div class="sechd" style="margin-top:0;color:#854F0B">Limit use if possible or seek alternatives ('+flaggedAssets.length+')</div><div style="background:#FAEEDA;border-radius:8px;padding:10px 12px;font-size:13px;color:#854F0B;margin-bottom:12px">Review these assets. Consider switching to AO recommended alternatives where possible. <a href="https://megtei.github.io/Materials_Methods_Plan/" target="_blank" style="color:#854F0B;font-weight:700;text-decoration:underline">View AO Target Materials List &#8599;</a></div>'+flaggedAssets.map(a=>{const flagMats=a.materials.filter(m=>{if(!m.tmlRef||m.tmlRef==='OTHER')return false;const t=TML.find(x=>x.ref===m.tmlRef);return t&&t.status==='no';});return'<div class="srow"><span class="bdg am">'+esc(a.assetName||'Asset')+'</span><span style="flex:1;margin:0 8px;color:#555;font-size:12px">'+flagMats.map(m=>esc(m.name||m.tmlRef)).join(', ')+'</span></div>';}).join('')+'</div>':'';
  const assetRows=assets.map((a,idx2)=>{
    const precLabel=a.prec||'';
    const matList=a.materials.map(m=>{
      const statClr=STCOL[m.stat]||'#94a3b8';
      const statBdgMap={'Reuse \u2013 Next AO (stored at AO)':'gr','Reuse \u2013 Next AO (stored by us)':'gr','Reuse \u2013 Other Event / Client':'tl','Recycle':'bl','Repurpose – use material in another way':'pu','Donate':'pu','Mixed construction waste \u2013 AO onsite bin':'re','Not sure yet':'gy','Other':'gy'};
      const volHtml=m.vol?'<span style="color:#aaa;font-size:11px">'+esc(m.vol)+' '+esc(m.vunit)+'</span>':'';
      const statHtml=m.stat?'<span class="bdg '+(statBdgMap[m.stat]||'gy')+'">'+esc(m.stat)+'</span>':'';
      return '<div class="smat-item"><span class="smat-dot" style="background:'+statClr+'"></span><span style="flex:1">'+esc(m.name||m.cat||'Unnamed')+'</span>'+volHtml+statHtml+'</div>';
    }).join('');
    const precBdg=precLabel?'<span class="bdg bl" style="font-size:10px">'+esc(precLabel)+'</span>':'';
    const descHtml=a.desc?'<div style="font-size:12px;color:#888;margin-bottom:5px;padding-left:2px">'+esc(a.desc)+'</div>':'';
    return '<div style="padding:10px 0;border-bottom:1px solid #e8e5de"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><span style="font-size:11px;color:#aaa;font-weight:700">#'+(idx2+1)+'</span>'+precBdg+'<span style="font-size:13px;font-weight:600;flex:1">'+esc(a.assetName||'Unnamed asset')+'</span>'+assetCirc(a)+'</div>'+descHtml+'<div class="smat-list">'+matList+'</div></div>';
  }).join('');
  const auditBlock=(()=>{
    if(!plan.audit||!plan.audit.length)return '';
    const rows=plan.audit.slice().reverse().slice(0,10).map(e=>'<div class="audit-row"><div class="audit-dot"></div><div class="audit-who">'+esc(e.who||'Unknown')+'</div><div class="audit-what">'+esc(e.action||'Updated plan')+'</div><div class="audit-when">'+(e.when?fmtDate(e.when):'')+'</div></div>').join('');
    const more=plan.audit.length>10?'<div style="font-size:11px;color:#aaa;padding-top:4px">Showing 10 most recent of '+plan.audit.length+' edits</div>':'';
    return '<div class="card"><div class="sechd" style="margin-top:0">Edit history</div><div class="audit-log">'+rows+'</div>'+more+'</div>';
  })();
  const lastEditedHtml=plan.lastEditedBy?'<div style="margin-top:10px;padding-top:10px;border-top:1px solid #e8e5de"><div style="display:flex;justify-content:space-between;align-items:baseline"><div style="font-size:12px;color:#888">Last edited by</div><div style="font-size:11px;color:#aaa">'+(plan.lastEditedAt?fmtDate(plan.lastEditedAt):'')+'</div></div><div style="font-size:13px;font-weight:600;color:#185FA5;margin-top:2px">'+esc(plan.lastEditedBy)+'</div></div>':'';
  const storageHtml=p.storageDetails?'<div style="margin-top:10px"><div style="font-size:12px;color:#888">Storage</div><div style="font-size:13px;margin-top:2px;color:#1a1a1a">'+esc(p.storageDetails)+'</div></div>':'';
  const circBody=sc.total>0?'<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px"><span>Circularity rate</span><span style="font-weight:600;color:'+cl+'">'+sc.pct+'%</span></div><div class="strack"><div class="sfill" style="width:'+sc.pct+'%;background:'+cl+'"></div></div><div style="font-size:11px;color:#aaa;margin-top:3px">AO target: 10% improvement per year</div>':'<div style="font-size:13px;color:#888;margin-top:4px">Add materials with an expected status to see your score.</div>';
  const customHtml=customMats.length?'<div style="font-size:12px;color:#888">Custom: '+customMats.map(m=>'<strong>'+esc(m.name||'Unnamed')+'</strong>').join(', ')+'</div>':'';
  const saveBtnHtml=S.plan._example?'':'<button onclick="savePlan()" style="background:linear-gradient(135deg,#185FA5,#0F4C8A);color:#fff;border-color:#0F4C8A;font-weight:700;padding:9px 20px;box-shadow:0 2px 8px rgba(24,95,165,.3)">Save plan &#10003;</button>';
  const unsavedBadge=S._unsaved&&!S.plan._example?'<span id="unsaved-badge" style="font-size:11px;font-weight:700;color:#854F0B;background:#FAEEDA;border:1px solid #f5ddb7;border-radius:6px;padding:3px 9px;white-space:nowrap">&#9679; Unsaved changes</span>':'';

  let h='';
  h+='<div class="card">';
  h+='<div class="sechd" style="margin-top:0">Plan details</div>';
  h+='<div class="g2"><div><div style="font-size:12px;color:#888">Business</div><div style="font-size:14px;font-weight:600;margin-top:2px">'+(esc(p.businessName)||'-')+'</div></div><div><div style="font-size:12px;color:#888">Plan owner</div><div style="font-size:14px;margin-top:2px">'+(esc(p.ownerName)||'-')+'</div></div></div>';
  h+='<div class="g2" style="margin-top:10px"><div><div style="font-size:12px;color:#888">Role</div><div style="font-size:14px;margin-top:2px">'+(esc(p.role)||'-')+'</div></div><div><div style="font-size:12px;color:#888">Date</div><div style="font-size:14px;margin-top:2px">'+fmtAUDate(p.date)+'</div></div></div>';
  const sumCode=planCode(S.plan.id);
  h+='<div class="plan-id-badge">'
    +'<div><div class="plan-id-lbl">Plan ID</div><div class="plan-id-code">'+sumCode+'</div></div>'
    +'<button class="plan-id-copy-btn" data-code="'+sumCode+'" onclick="copyCode(this)">Copy</button>'
    +'</div>';
  h+=lastEditedHtml+storageHtml;
  h+='</div>';
  h+='<div class="card">';
  h+='<div class="sechd" style="margin-top:0">Circularity score</div>';
  h+='<div class="metg"><div class="met"><div class="mval">'+allMats.length+'</div><div class="mlbl">Total materials</div></div><div class="met"><div class="mval" style="color:'+cl+'">'+(sc.total>0?sc.pct+'%':'-')+'</div><div class="mlbl">Diverted from landfill</div></div><div class="met"><div class="mval" style="color:#A32D2D">'+sc.landfill+'</div><div class="mlbl">To landfill</div></div></div>';
  h+=circBody;
  h+='</div>';
  const actualCts={};for(const m of allMats)if(m.outcome&&m.outcome!=='')actualCts[m.outcome]=(actualCts[m.outcome]||0)+1;

    +'Your data is securely routed to and stored on Australian servers and infrastructure. '

    +'<a onclick="switchTab(\'faq\');setTimeout(()=>{const el=document.getElementById(\'faq-privacy\');if(el){el.classList.add(\'open\');const ic=document.getElementById(\'icon-faq-privacy\');if(ic)ic.classList.add(\'open\');}},100);return false;" href="#" style="color:#185FA5;font-weight:600;text-decoration:underline">View our full Privacy Policy</a> to learn more.'
    +'</div>';
  h+=consentHtml;
  h+='<div class="acts" style="margin-top:.75rem"><button onclick="goPrev()">&larr; Back</button>'+(S.plan._example?'<button onclick="goHome()" style="background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700">&#8962; Home</button>':'<button onclick="window.print()">Print / PDF</button><button onclick="exportPlanXLS()">Export XLS</button>'+unsavedBadge+saveBtnHtml)+'</div>';
  return h;
}

function triggerImport(){const el=document.getElementById('import-xls-input');if(el)el.click();}

function importPlanXLS(input){
  const file=input.files[0];
  if(!file){return;}

  if(typeof XLSX==='undefined'){showToast('Export library not loaded yet. Please try again.');input.value='';return;}

  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellStyles:true,raw:false});
      const ws=wb.Sheets[wb.SheetNames[0]];

      const gv=(addr)=>{const cell=ws[addr];return cell?(cell.v!==undefined&&cell.v!==null?String(cell.v).trim():''):'';};

      // Validate it's an AO plan export
      const title=gv('A1');
      if(!title.includes('AO27')){
        showToast('File not recognised as an AO27 Materials Plan.');
        input.value='';return;
      }

      // Extract plan ID from A2 (format: "PLAN_ID:xxxxx")
      const idRow=gv('A2');
      const existingId=idRow.startsWith('PLAN_ID:')?idRow.slice(8).trim():null;

      // Find existing plan or create new
      let plan=null;
      let isUpdate=false;
      if(existingId){
        const stored=S.plans.find(p=>p.id===existingId);
        if(stored){plan=JSON.parse(JSON.stringify(stored));isUpdate=true;}
      }
      if(!plan)plan=newPlan();
      if(existingId&&!isUpdate)plan.id=existingId; // preserve ID for new-to-this-device

      // ── Field length limits & sanitisation ──────────────────────────────
      const clamp=(v,max)=>String(v||'').slice(0,max);

      // Business details
      plan.profile.businessName = clamp(gv('B4'), 200);
      plan.profile.ownerName    = clamp(gv('D4'), 200);
      plan.profile.role         = clamp(gv('B5'), 100);
      plan.profile.email        = clamp(gv('D5'), 254);
      plan.profile.date         = clamp(gv('B6'), 20);
      plan.profile.editorName   = clamp(gv('B7'), 200);
      plan.lastEditedBy         = clamp(gv('B7'), 200);
      plan.profile.wasteTarget  = clamp(gv('B10'), 300);
      plan.profile.reuseTarget  = clamp(gv('B11'), 300);
      plan.profile.storageDetails=clamp(gv('B12'), 500);

      // Parse material rows 16 onwards
      const assetMap={};
      const assetOrder=[];
      let r=16;
      while(true){
        const assetNum=gv('A'+r);
        // Stop on first truly empty row after data
        if(!assetNum&&!gv('B'+r)&&!gv('C'+r)&&r>20)break;
        if(!assetNum){r++;if(r>200)break;continue;}

        const prec     =gv('B'+r);
        const assetName=gv('C'+r);
        const desc     =gv('D'+r);
        const matNum   =gv('E'+r);
        const tmlRef   =gv('F'+r);
        const matName  =gv('G'+r);
        const app      =gv('H'+r);
        const vol      =gv('I'+r);
        const vunit    =gv('J'+r)||'sqm';
        const stat     =gv('K'+r);
        const outcome  =gv('L'+r);

        if(!assetMap[assetNum]){
          assetMap[assetNum]={id:uid(),expanded:false,prec:clamp(prec,100),precCustom:'',
            assetName:clamp(assetName,200),desc:clamp(desc,500),materials:[]};
          assetOrder.push(assetNum);
        }
        // vol must be numeric; reject anything that isn't a number
        const volRaw=gv('I'+r);
        const volNum=parseFloat(volRaw);
        const volSafe=(!volRaw||isNaN(volNum))?'':String(Math.max(0,volNum));
        assetMap[assetNum].materials.push(
          {id:uid(),cat:'',app:clamp(app,150),tmlRef:clamp(tmlRef,10),name:clamp(matName,200),
           vol:volSafe,vunit:clamp(vunit,10)||'sqm',stat:clamp(stat,100),outcome:clamp(outcome,100)}
        );
        r++;
      }
      plan.assets=assetOrder.map(n=>assetMap[n]);

      // Parse audit rows 53 onwards
      const existingAudit=plan.audit||[];
      let arow=53;
      const importedAudit=[];
      while(arow<200){
        const who=gv('A'+arow);
        const action=gv('B'+arow);
        if(!who&&!action)break;
        importedAudit.push({who,action:action||'Updated plan',when:0});
        arow++;
      }
      // Merge: keep existing audit, add import notice
      plan.audit=existingAudit;
      plan.lastEditedAt=Date.now();
      plan.lastEditedBy=plan.profile.editorName||plan.profile.ownerName||'Unknown';
      if(!plan.audit)plan.audit=[];
      plan.audit.push({
        who:plan.lastEditedBy,
        action:isUpdate?'Updated plan from XLS import':'Imported from XLS',
        when:Date.now()
      });

      // Save and load
      storageSave(plan);
      const idx=S.plans.findIndex(p=>p.id===plan.id);
      if(idx>=0)S.plans[idx]=JSON.parse(JSON.stringify(plan));
      else S.plans.unshift(JSON.parse(JSON.stringify(plan)));

      S.plan=plan;
      S.screen='form';
      S.plan.step=2; // Go to summary to review
      S._unsaved=true; // imported plan should still be saved via savePlan to cloud
      sendPlanEmail(plan, !isUpdate); // send email: created if not an update
      showToast(isUpdate?'Plan updated from XLS':'Plan imported from XLS');
      render();
    }catch(err){
      console.error('Import error:',err);
      showToast('Import failed - check the file format');
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}

async function _doExportXLS(){
  const plan=S.plan;
  const p=plan.profile;
  const assets=plan.assets||[];
  try{
    showToast('Preparing export\u2026');
    const bytes=Uint8Array.from(atob(XLSX_TEMPLATE_B64),ch=>ch.charCodeAt(0));
    const zip=await JSZip.loadAsync(bytes);

    // XML-safe escape
    const esc=v=>String(v==null?'':v)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;');

    // Inline string cell — safe for sheet1 (no Table)
    const ic=(ref,s,val)=>{
      const v=esc(String(val==null?'':val));
      return v
        ?'<c r="'+ref+'" s="'+s+'" t="inlineStr"><is><t>'+v+'</t></is></c>'
        :'<c r="'+ref+'" s="'+s+'"/>';
    };

    // Replace one cell in XML, preserving s= style attribute
    const replCell=(xml,ref,sIdx,val)=>{
      const re=new RegExp('<c r="'+ref+'" s="'+sIdx+'"(?:\\s[^>]*)?(?:/>|>[\\s\\S]*?</c>)');
      const r=ic(ref,sIdx,val);
      const out=xml.replace(re,r);
      if(out===xml){
        const rowRe=new RegExp('(<row r="'+(ref.replace(/[A-Z]+/,''))+'\"[^>]*>)');
        return xml.replace(rowRe,'$1'+r);
      }
      return out;
    };

    // ── SHEET 1: AO Materials Mgt (no Table — inline strings are fine) ────────
    let s1=await zip.file('xl/worksheets/sheet1.xml').async('string');

    s1=replCell(s1,'B3',7,planCode(plan.id));
    s1=replCell(s1,'B5',7,p.businessName||'');
    s1=replCell(s1,'D5',7,p.ownerName||'');
    s1=replCell(s1,'B6',7,p.role||'');
    s1=replCell(s1,'D6',7,p.email||'');
    s1=replCell(s1,'B7',7,p.date||'');
    s1=replCell(s1,'B8',7,plan.lastEditedBy||p.editorName||'');
    s1=replCell(s1,'D8',7,
      plan.lastEditedAt?new Date(plan.lastEditedAt).toLocaleDateString('en-AU'):(p.date||''));
    s1=replCell(s1,'B11',2,p.wasteTarget||'');
    s1=replCell(s1,'B12',2,p.reuseTarget||'');
    s1=replCell(s1,'B13',2,p.storageDetails||'');

    const COLS=['A','B','C','D','E','F','G','H','I','J','K','L'];
    const matRows=[];
    let rowIdx=17;

    for(let ai=0;ai<assets.length;ai++){
      const a=assets[ai];
      for(let mi=0;mi<(a.materials||[]).length;mi++){
        const m=a.materials[mi];
        const vals=[
          ai+1,a.prec||'',a.assetName||'',a.desc||'',
          mi+1,m.tmlRef||'',m.name||'',m.app||'',
          m.vol||'',m.vunit||'sqm',m.stat||'',m.outcome||''
        ];
        if(rowIdx<=81){
          for(let ci=0;ci<12;ci++){
            const ref=COLS[ci]+rowIdx;
            const re=new RegExp('<c r="'+ref+'" s="10"(?:\\s[^>]*)?(?:/>|>[\\s\\S]*?</c>)');
            s1=s1.replace(re,ic(ref,10,vals[ci]));
          }
        } else {
          const cells=vals.map((v,ci)=>ic(COLS[ci]+rowIdx,10,v)).join('');
          s1=s1.replace('</sheetData>',
            '<row r="'+rowIdx+'" spans="1:12" x14ac:dyDescent="0.35">'+cells+'</row></sheetData>');
        }
        matRows.push({ai,mi,a,m});
        rowIdx++;
      }
    }
    s1=s1.replace(/ref="A1:L\d+"/,'ref="A1:L'+Math.max(82,rowIdx-1)+'"');
    zip.file('xl/worksheets/sheet1.xml',s1);

    // ── SHARED STRINGS — needed for sheet2 (has Excel Table, requires t="s") ──
    // t="inlineStr" is rejected inside Tables; must use shared string references.
    let ssXml=await zip.file('xl/sharedStrings.xml').async('string');
    const existingCount=parseInt((ssXml.match(/count="(\d+)"/) ||[0,'0'])[1]);
    const existingUnique=parseInt((ssXml.match(/uniqueCount="(\d+)"/) ||[0,'0'])[1]);
    const newSS=[];

    // Build a shared-string cell — appends value to sharedStrings and refs by index
    const ssc=(ref,sIdx,val)=>{
      const v=String(val==null?'':val);
      if(!v) return '<c r="'+ref+'" s="'+sIdx+'"/>';
      const escaped=esc(v);
      const idx=existingUnique+newSS.length;
      newSS.push('<si><t xml:space="preserve">'+escaped+'</t></si>');
      return '<c r="'+ref+'" s="'+sIdx+'" t="s"><v>'+idx+'</v></c>';
    };

    // ── SHEET 2: Customer Assets ─────────────────────────────────────────────────
    // One row per asset. Only two fields populated from the plan:
    //   E = Descriptive Name  ← Asset / Item name (step 2)
    //   K = Department        ← Department from Business Details
    // All other columns (category, location, etc.) left blank for manual entry.
    // L column (Owner VLOOKUP formula) is intentionally never touched.
    let s2=await zip.file('xl/worksheets/sheet2.xml').async('string');
    let r2=3;
    for(let ai=0;ai<assets.length;ai++){
      const a=assets[ai];
      if(!(a.assetName||'').trim()) continue;  // skip empty asset rows
      const si=r2%2===0?13:12;
      const pairs=[
        ['E', a.assetName||''],          // Descriptive Name = Asset / Item
        ['K', p.department||''],         // Department from Business Details
      ];
      for(const[col,val]of pairs){
        const ref=col+r2;
        const re=new RegExp('<c r="'+ref+'" s="'+si+'"(?:\\s[^>]*)?(?:/>|>[\\s\\S]*?</c>)');
        s2=s2.replace(re,ssc(ref,si,val));
      }
      r2++;
    }
    zip.file('xl/worksheets/sheet2.xml',s2);

    // Update sharedStrings.xml with all newly added strings
    if(newSS.length>0){
      const total=existingCount+newSS.length;
      const unique=existingUnique+newSS.length;
      ssXml=ssXml.replace('</sst>',newSS.join('')+'</sst>');
      ssXml=ssXml.replace(/count="\d+"/,`count="${total}"`);
      ssXml=ssXml.replace(/uniqueCount="\d+"/,`uniqueCount="${unique}"`);
      zip.file('xl/sharedStrings.xml',ssXml);
    }

    // ── CALCHAIN — remove cleanly so Excel regenerates it (avoids repair error) ─
    // calcChain.xml caches formula calc order; its absence is fine — Excel rebuilds.
    zip.remove('xl/calcChain.xml');
    // Remove from [Content_Types].xml
    let ct=await zip.file('[Content_Types].xml').async('string');
    ct=ct.replace(/<Override[^>]*calcChain[^>]*\/>/g,'');
    zip.file('[Content_Types].xml',ct);
    // Remove relationship from workbook.xml.rels
    let wbRels=await zip.file('xl/_rels/workbook.xml.rels').async('string');
    wbRels=wbRels.replace(/<Relationship[^>]*calcChain[^>]*\/>/g,'');
    zip.file('xl/_rels/workbook.xml.rels',wbRels);

    // ── Download ──────────────────────────────────────────────────────────────
    const blob=await zip.generateAsync({type:'blob',compression:'DEFLATE',
      compressionOptions:{level:6}});
    const url=URL.createObjectURL(blob);
    const fname=(p.businessName||'AO27_Plan').replace(/[^a-z0-9]/gi,'_')+'_Materials_Plan.xlsx';
    const a=document.createElement('a');
    a.href=url;a.download=fname;
    document.body.appendChild(a);a.click();
    setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},200);
    showToast('Exported \u2713');

  }catch(err){
    console.error('Export error:',err);
    showToast('Export failed \u2014 '+err.message);
  }
}

function confirmLeaveIfUnsaved(proceedFn){
  // Show inline warning banner on summary page instead of browser dialog
  const existing=document.getElementById('unsaved-warn');

  const warn=document.createElement('div');
  warn.id='unsaved-warn';
  warn.style.cssText='position:fixed;bottom:0;left:0;right:0;z-index:998;background:#FAEEDA;border-top:2px solid #EF9F27;padding:12px 1rem;display:flex;align-items:center;gap:10px;justify-content:space-between;box-shadow:0 -4px 16px rgba(0,0,0,.1)';
  warn.innerHTML='<div style="font-size:13px;color:#854F0B;font-weight:600">⚠ You have unsaved changes. Save your plan before leaving so you can return to it.</div>'
    +'<div style="display:flex;gap:8px;flex-shrink:0">'
    +'<button id="unsaved-leave-btn" style="font-size:12px;padding:7px 14px;border:1px solid #c9a87a;background:#fff;color:#854F0B;border-radius:7px;cursor:pointer">Leave without saving</button>'
    +'<button onclick="savePlan();document.getElementById(\'unsaved-warn\').remove();" style="font-size:12px;padding:7px 14px;background:#185FA5;color:#fff;border:none;border-radius:7px;cursor:pointer;font-weight:700">Save now</button>'

}

    return;
  }

}

function createNewPlan(){S.plan=newPlan();S._unsaved=false;S.screen='form';render();}
function loadExample(){S.plan=Object.assign(examplePlan(),{_example:true});S.screen='form';render();}
function goNext(){
  if(S.plan.step===0)saveAbout();
  if(S.plan._aboutInvalid)return;
  if(S.plan.step===1){
    // Validate assets before advancing to summary
    const assets=S.plan.assets||[];
    if(!assets.length){showToast('Add at least one asset before continuing.');return;}
    const errors=[];
    assets.forEach((a,i)=>{
      const label='Asset '+(i+1)+(a.assetName?' ('+a.assetName+')':'');
      if(!a.prec)errors.push(label+': Precinct is required');
      if(!a.assetName)errors.push(label+': Asset name is required');
      a.materials.forEach((m,j)=>{
        const ml=label+', Material '+(j+1);
        if(j===0&&!a.materials[0].app)errors.push(label+': Precinct application (field 4) is required');
        if(!m.tmlRef)errors.push(ml+': Select a material from the AO Target Materials List or choose "Not AO target material" (field 6)');
        if(m.tmlRef==='OTHER'&&!m.name)errors.push(ml+': Material name required at 6a');
        if(!m.vol)errors.push(ml+': Volume is required');
        if(!m.stat)errors.push(ml+': Expected status (field 7) is required');
      });
    });
    if(errors.length){
      showToast(errors.length+' required field'+(errors.length>1?'s':'')+' missing — check assets');
      console.warn('Asset validation errors:',errors);
      return;
    }
  }
  if(S.plan.step<2){S.plan.step++;if(S.plan.step>=1)S._unsaved=true;render();}
}
function goPrev(){
  if(S.plan.step===2&&S._unsaved&&!S.plan._example){
    confirmLeaveIfUnsaved(()=>{S.plan.step--;render();});
    return;
  }
  if(S.plan.step>0){S.plan.step--;render();}
}

    const ok=this.value.trim().toUpperCase()==='DELETE';
    confirmBtn.disabled=!ok;
    confirmBtn.style.opacity=ok?'1':'.4';
  });
  cancelBtn.onclick=function(){overlay.remove();};
  overlay.addEventListener('click',function(e){if(e.target===overlay)overlay.remove();});
  confirmBtn.onclick=function(){
    overlay.remove();
    storageDel(id);
    S.plans=S.plans.filter(p=>p.id!==id);
    render();
    showToast('Plan deleted');
  };
  // Focus the input for keyboard users
  setTimeout(()=>input.focus(),50);
}
function savePlan(){
  if(S.plan._example){showToast('Example plans cannot be saved');return;}
  const editor=S.plan.profile.editorName||S.plan.profile.ownerName||'Unknown';
  const now=Date.now();
  if(!S.plan.audit)S.plan.audit=[];
  if(!S.plan.createdAt)S.plan.createdAt=now;
  S.plan.lastEditedBy=editor;
  S.plan.lastEditedAt=now;
  S.plan.audit.push({who:editor,when:now,action:'Saved plan'});

  // Detect new vs update BEFORE saving (so we can send the right email)
  const isNew = S.plans.findIndex(p=>p.id===S.plan.id) < 0;

  planDB.save(S.plan).then(res=>{
    const i=S.plans.findIndex(p=>p.id===S.plan.id);
    if(i>=0)S.plans[i]=JSON.parse(JSON.stringify(S.plan));
    else S.plans.unshift(JSON.parse(JSON.stringify(S.plan)));
    if(res.ok){
      S._unsaved=false; // clear dirty flag
      const warnBanner=document.getElementById('unsaved-warn');
      if(warnBanner)warnBanner.remove();
      const badge=document.getElementById('unsaved-badge');
      if(badge)badge.remove();
      showSavedModal(planCode(S.plan.id), res.source);
      sendPlanEmail(S.plan, isNew); // fire-and-forget email confirmation
    } else {
      showToast('Save failed - please try again');
    }
  });
}

function showSavedModal(code, source){
  const ex=document.getElementById('saved-modal');if(ex)ex.remove();
  const m=document.createElement('div');
  m.id='saved-modal';
  m.style.cssText='position:fixed;inset:0;background:rgba(10,34,64,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem';
  const inner=document.createElement('div');
  inner.style.cssText='background:#fff;border-radius:14px;padding:1.75rem;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)';
  inner.innerHTML='<div style="text-align:center;margin-bottom:1.25rem">'
    +'<div style="width:48px;height:48px;background:#E1F5EE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:22px">&#10003;</div>'
    +'<div style="font-size:17px;font-weight:800;color:#0A2240;margin-bottom:.25rem">Plan saved</div>'
    +'<div style="font-size:13px;color:#666">Save your Plan ID to retrieve this plan on any device</div>'
    +'</div>'
    +'<div style="background:#EEF9F4;border:2px solid #b2e8d2;border-radius:10px;padding:14px 16px;margin-bottom:1rem;text-align:center">'
    +'<div style="font-size:10px;font-weight:700;color:#0F6E56;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Your Plan ID</div>'
    +'<div style="font-family:monospace;font-size:26px;font-weight:800;color:#0A2240;letter-spacing:.1em">'+code+'</div>'
    +'</div>';
  const copyBtn=document.createElement('button');
  copyBtn.setAttribute('data-code',code);
  copyBtn.style.cssText='width:100%;padding:10px;background:#0F6E56;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit';
  copyBtn.textContent='Copy Plan ID';
  copyBtn.onclick=function(){copyCode(this);};
  const note=document.createElement('div');
  note.style.cssText='font-size:11.5px;color:#888;line-height:1.6;margin-bottom:1rem';
  note.innerHTML='Enter this ID on <strong>Create a materials plan</strong> to reload from any device. Also embedded in your XLS export.';
  const closeBtn=document.createElement('button');
  closeBtn.style.cssText='width:100%;padding:9px;background:#f5f5f3;color:#555;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit';
  closeBtn.textContent='Close';
  closeBtn.onclick=function(){m.remove();};
  inner.appendChild(copyBtn);inner.appendChild(note);inner.appendChild(closeBtn);
  m.appendChild(inner);
  document.body.appendChild(m);
  // Show cloud/local indicator
  const srcNote=document.getElementById('save-source-note');
  if(srcNote){
    if(source==='cloud'){
      srcNote.innerHTML='<span style="color:#0F6E56;font-weight:700">Saved to cloud.</span> ';
    } else {
      srcNote.innerHTML='<span style="color:#854F0B;font-weight:700">Saved locally only'+(SUPABASE_READY?'':' (Supabase not configured)')+'.</span> ';
    }
  }
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
}

// ── Asset CRUD ────────────────────────────────────────────────────────────────
function addAsset(){
  S.plan.assets.push(newAsset({expanded:true}));
  refreshAssets();
  setTimeout(()=>{const els=document.querySelectorAll('.acard-bd');if(els.length)els[els.length-1].scrollIntoView({behavior:'smooth',block:'nearest'})},80);
}
function delAsset(aid){
  S.plan.assets=S.plan.assets.filter(a=>a.id!==aid);
  refreshAssets();
}
function toggleAsset(aid){
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  a.expanded=!a.expanded;
  const bd=document.getElementById('abd-'+aid);const arr=document.getElementById('arr-'+aid);
  if(bd)bd.style.display=a.expanded?'':'none';
  if(arr)arr.innerHTML=a.expanded?'&#9650;':'&#9660;';
}

function saveAsset(aid){
  const ok=storageSave(S.plan);
  if(ok){const i=S.plans.findIndex(p=>p.id===S.plan.id);if(i>=0)S.plans[i]=JSON.parse(JSON.stringify(S.plan));else S.plans.unshift(JSON.parse(JSON.stringify(S.plan)));showToast('Asset saved \u2713');}
  else showToast('Save failed - please try again');
}

// ── Asset-level field update ──────────────────────────────────────────────────
function upAsset(el){
  const aid=el.dataset.aid;const f=el.dataset.f;
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  a[f]=el.value;
  // Update header name
  const nm=document.querySelector('#ac-'+aid+' .aname');
  if(nm){const precLabel=a.prec||'';nm.textContent=a.assetName||precLabel||'New asset';}
  // Update score bar
  const assets=S.plan.assets||[];const sc=calcScore(assets);const cl=fillClr(sc.pct);
  const allMatsCount=assets.flatMap(a=>a.materials||[]).length;
  const sb=document.getElementById('score-bar');
  if(sb)sb.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px"><span>${assets.length} asset${assets.length!==1?'s':''} &middot; ${allMatsCount} material${allMatsCount!==1?'s':''} &middot; ${sc.nonLandfill} diverted from landfill</span><span style="font-weight:600;color:${cl}">${sc.total>0?sc.pct+'% circular':''}</span></div><div class="strack"><div class="sfill" style="width:${sc.pct}%;background:${cl}"></div></div>`;
}

// ── Material-level field update ───────────────────────────────────────────────
function toggleOutcomeOther(sel,aid,mid){
  const span=document.getElementById('outcome-other-'+aid+'-'+mid);
  if(span)span.style.display=sel.value==='Other'?'block':'none';
}

function upAssetMat(el){
  const aid=el.dataset.aid;const mid=el.dataset.mid;const f=el.dataset.f;
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  const m=a.materials.find(x=>x.id===mid);if(!m)return;
  m[f]=el.value;
  // Update material row header label
  const hd=document.querySelector('#mr-'+mid+' .mat-row-name');
  if(hd)hd.textContent=m.name||m.cat||'Material';
  // Refresh circ badge in asset header when stat changes
  if(f==='stat'){
    const circEl=document.querySelector('#ac-'+aid+' .acard-hd span[style*="color"]');
    if(circEl){const newCirc=assetCirc(a);const tmp=document.createElement('div');tmp.innerHTML=newCirc;if(tmp.firstChild)circEl.replaceWith(tmp.firstChild);}
    // Update score bar
    const assets=S.plan.assets||[];const sc=calcScore(assets);const cl=fillClr(sc.pct);
    const allMatsCount=assets.flatMap(x=>x.materials||[]).length;
    const sb=document.getElementById('score-bar');
    if(sb)sb.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px"><span>${assets.length} asset${assets.length!==1?'s':''} &middot; ${allMatsCount} material${allMatsCount!==1?'s':''} &middot; ${sc.nonLandfill} diverted from landfill</span><span style="font-weight:600;color:${cl}">${sc.total>0?sc.pct+'% circular':''}</span></div><div class="strack"><div class="sfill" style="width:${sc.pct}%;background:${cl}"></div></div>`;
  }
}

// ── TML pick (within asset mat) ───────────────────────────────────────────────
function pickAssetMatTML(el){
  const aid=el.dataset.aid;const mid=el.dataset.mid;const val=el.value;
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  const m=a.materials.find(x=>x.id===mid);if(!m)return;

  if(val===''){
    m.tmlRef='';m.name='';
    refreshAssets();return;
  }
  if(val==='OTHER'){
    m.tmlRef='OTHER';m.name='';
    // Show field 7, hide TML info
    const f7=document.getElementById('f7-'+mid);if(f7)f7.style.display='';
    const hd=document.querySelector('#mr-'+mid+' .mat-row-name');if(hd)hd.textContent='Other material';
    return;
  }
  const t=TML.find(x=>x.ref===val);if(!t)return;
  m.tmlRef=val;m.name=t.name;m.cat=t.cat;
  refreshAssets();
}

// ── Asset material CRUD ───────────────────────────────────────────────────────
function addAssetMat(aid){
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  a.materials.push(newAssetMat());
  // Re-render just the materials section for this asset
  const mats=document.getElementById('mats-'+aid);
  if(mats){let h='';for(let j=0;j<a.materials.length;j++)h+=matRowHtml(aid,a.materials[j],j);mats.innerHTML=h;}
  // Update materials count label
  const lbl=document.querySelector('#ac-'+aid+' .mats-divider-lbl');
  if(lbl)lbl.textContent=`Materials in this asset (${a.materials.length})`;
  // Update mat badge in header
  const hd=document.querySelector('#ac-'+aid+' .acard-hd');
  const matBdgEl=hd?hd.querySelector('.bdg.gy'):null;
  if(matBdgEl&&a.materials.length>1)matBdgEl.textContent=`${a.materials.length} mats`;
  else if(!matBdgEl&&a.materials.length>1&&hd){const nb=document.createElement('span');nb.className='bdg gy';nb.style.fontSize='10px';nb.textContent=`${a.materials.length} mats`;hd.insertBefore(nb,hd.querySelector('.aname'));}
  // Scroll to new row
  setTimeout(()=>{const rows=mats?mats.querySelectorAll('.mat-row'):[];if(rows.length)rows[rows.length-1].scrollIntoView({behavior:'smooth',block:'nearest'})},50);
}

function delAssetMat(aid,mid){
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  if(a.materials.length<=1){showToast('An asset needs at least one material. Delete the asset to remove it entirely.');return;}
  a.materials=a.materials.filter(m=>m.id!==mid);
  const mats=document.getElementById('mats-'+aid);
  if(mats){let h='';for(let j=0;j<a.materials.length;j++)h+=matRowHtml(aid,a.materials[j],j);mats.innerHTML=h;}
  const lbl=document.querySelector('#ac-'+aid+' .mats-divider-lbl');
  if(lbl)lbl.textContent=`Materials in this asset (${a.materials.length})`;
}

// ── Init ──────────────────────────────────────────────────────────────────────
function init(){
  const raw=storageLoadAll();
  S.plans=raw.map(migratePlan);
  S.screen='home';render();
  // Background TML sync — fetches latest data from Materials_Methods_Plan repo.
  // Re-renders if TML changed so any open Step 5 reflects fresh data.
  syncRemoteTML().then(()=>{
    if(S.screen==='form'&&S.plan&&S.plan.step===4) render();
  });
}
init();
</script>
