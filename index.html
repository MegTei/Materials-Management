<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Materials Management - Australian Open</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0eff0;color:#1a1a1a;font-size:15px;line-height:1.5}
.app{max-width:700px;margin:0 auto;padding:0 0 5rem}

/* ── Highlighted header bar ─────────────────────────────────────────────── */
.ao-hdr-wrap{background:linear-gradient(135deg,#0A2240 0%,#0F3460 60%,#185FA5 100%);position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.25)}
.ao-hdr-accent{height:4px;background:linear-gradient(90deg,#1D9E75 0%,#378ADD 50%,#1D9E75 100%)}
.ao-hdr{display:flex;align-items:center;justify-content:space-between;padding:.9rem 1.25rem;max-width:700px;margin:0 auto}
.ao-hdr-left{display:flex;align-items:center;gap:12px}
.ao-logo-mark{display:flex;gap:3px;align-items:center}
.ao-logo-mark span{display:block;width:6px;border-radius:2px;background:#1D9E75}
.ao-org{font-size:10px;font-weight:700;letter-spacing:.12em;color:rgba(255,255,255,.55);text-transform:uppercase;margin-bottom:2px}
.ao-ttl{font-size:17px;font-weight:700;color:#fff;letter-spacing:-.01em}
.ao-tag{font-size:10px;padding:3px 10px;border-radius:99px;background:rgba(29,158,117,.25);border:1px solid rgba(29,158,117,.5);color:#5DECBA;font-weight:700;letter-spacing:.04em}
.hdr-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px}

/* ── Content wrapper ────────────────────────────────────────────────────── */
.page-body{padding:1.25rem 1rem 2rem}
.prog-segs{display:flex;gap:4px;margin-bottom:5px}
.seg{flex:1;height:3px;border-radius:2px;background:#e0ddd6;transition:background .3s}
.seg.done{background:#1D9E75}.seg.active{background:#378ADD}
.prog-lbls{display:flex;margin-bottom:1.25rem}
.plbl{flex:1;text-align:center;font-size:11px;color:#aaa}
.plbl.active{color:#185FA5;font-weight:600}.plbl.done{color:#1D9E75}
.card{background:#fff;border:1px solid #e8e5de;border-radius:12px;padding:1rem 1.25rem;margin-bottom:12px}
.g2{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr);gap:10px}
.g3{display:grid;grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);gap:10px}
.fg{margin-bottom:10px}
.fg label{display:block;font-size:12px;color:#666;margin-bottom:3px}
.fhint{font-size:11px;color:#aaa;margin-top:2px}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #ddd;border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:#378ADD}
textarea{resize:vertical}
button{padding:8px 16px;border:1px solid #ccc;border-radius:7px;font-size:13px;font-family:inherit;background:#fff;color:#1a1a1a;cursor:pointer;transition:background .15s,border-color .15s}
button:hover{background:#f5f5f3;border-color:#aaa}
button:active{background:#eee}

/* Asset cards */
.acard{background:#fff;border:1px solid #e8e5de;border-radius:10px;margin-bottom:10px;overflow:hidden}
.acard-hd{display:flex;align-items:center;gap:7px;padding:10px 13px;cursor:pointer;transition:background .15s}
.acard-hd:hover{background:#f9f8f6}
.acard-bd{padding:14px 14px 8px;border-top:1px solid #e8e5de;background:#f9f8f6}
.aref{font-size:11px;color:#aaa;font-weight:700;flex-shrink:0}
.aname{flex:1;font-size:13px;font-weight:600;color:#1a1a1a;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}

/* Material rows within asset */
.mat-row{background:#fff;border:1px solid #e0ddd6;border-radius:8px;padding:12px;margin-bottom:8px;position:relative}
.mat-row-hd{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.mat-row-num{font-size:10px;font-weight:700;color:#185FA5;background:#E6F1FB;padding:2px 7px;border-radius:4px;flex-shrink:0}
.mat-row-name{flex:1;font-size:12px;color:#888;font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* Mats section divider inside asset */
.mats-divider{display:flex;align-items:center;justify-content:space-between;margin:12px 0 8px;padding-top:10px;border-top:1px dashed #ddd}
.mats-divider-lbl{font-size:11px;font-weight:700;letter-spacing:.07em;color:#888;text-transform:uppercase}
.btn-add-mat{font-size:11px;padding:4px 10px;color:#185FA5;border-color:rgba(24,95,165,.3);background:#E6F1FB}
.btn-add-mat:hover{background:#d4e8f7;border-color:#185FA5}

.bdg{font-size:11px;padding:2px 7px;border-radius:99px;font-weight:600;white-space:nowrap;flex-shrink:0}
.tl{background:#E1F5EE;color:#0F6E56}.gr{background:#EAF3DE;color:#3B6D11}.bl{background:#E6F1FB;color:#185FA5}
.am{background:#FAEEDA;color:#854F0B}.re{background:#FCEBEB;color:#A32D2D}.gy{background:#F1EFE8;color:#5F5E5A}.pu{background:#EEEDFE;color:#3C3489}
.strack{height:7px;border-radius:4px;background:#e8e5de;overflow:hidden}
.sfill{height:100%;border-radius:4px;transition:width .5s}
.metg{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin:.75rem 0}
.met{background:#f5f5f3;border-radius:8px;padding:12px;text-align:center}
.mval{font-size:22px;font-weight:600}.mlbl{font-size:11px;color:#888;margin-top:2px;line-height:1.3}
.pitem{display:flex;align-items:center;gap:10px;padding:12px 1.25rem;background:#fff;border:1px solid #e8e5de;border-radius:12px;margin-bottom:8px;cursor:pointer;transition:border-color .2s}
.pitem:hover{border-color:#bbb}
.pav{width:34px;height:34px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;color:#0F6E56;flex-shrink:0}
.srow{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #e8e5de;font-size:13px}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sechd{font-size:11px;font-weight:800;color:#0A2240;margin:2rem 0 .75rem;display:flex;align-items:center;gap:10px;text-transform:uppercase;letter-spacing:.1em}
.sechd::before{content:'';display:block;width:4px;height:18px;border-radius:2px;background:linear-gradient(180deg,#185FA5,#1D9E75);flex-shrink:0}
.sechd-first{margin-top:.25rem}
.hbox{background:#E6F1FB;border-radius:8px;padding:10px 12px;font-size:13px;color:#185FA5;margin-bottom:1rem;line-height:1.6}
.hbox a{color:#185FA5}
.acts{display:flex;gap:8px;justify-content:flex-end;margin-top:1.5rem;padding-top:1rem;border-top:1px solid #e8e5de}
.toast{position:fixed;bottom:2rem;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;white-space:nowrap}
.toast.show{opacity:1}

/* TML info box */
.tml-info{border-radius:6px;padding:7px 10px;font-size:11.5px;line-height:1.5;margin:5px 0;display:flex;gap:8px;align-items:flex-start}
.tml-info-yes{background:#E1F5EE;color:#0F6E56;border:1px solid #b7e4d0}
.tml-info-no{background:#FCEBEB;color:#A32D2D;border:1px solid #f5c6c6}
.tml-info-maybe{background:#FAEEDA;color:#854F0B;border:1px solid #f5ddb7}
.tml-info-icon{font-size:14px;flex-shrink:0;margin-top:1px}
.tml-ref-badge{display:inline-block;font-size:10px;font-weight:700;padding:1px 6px;border-radius:4px;background:rgba(0,0,0,.07);margin-right:4px;letter-spacing:.03em;vertical-align:middle}
.name-sub-label{font-size:11px;color:#999;margin-top:5px;margin-bottom:2px;display:block}

/* Add asset CTA */
.add-asset-area{border:2px dashed #d0cdc6;border-radius:10px;padding:1.25rem;text-align:center;margin-bottom:14px}
.add-asset-area p{font-size:12px;color:#999;margin-bottom:10px;line-height:1.5}
.btn-primary{background:#185FA5;color:#fff;border-color:#185FA5;font-weight:600}
.btn-primary:hover{background:#1a6bbf;border-color:#1a6bbf}

/* Summary mat list */
.smat-list{padding:6px 0 2px}
.smat-item{display:flex;align-items:center;gap:6px;padding:4px 0;font-size:12px;color:#555}
.smat-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:#94a3b8}

@media print{
  body{background:white;font-size:12px}
  .ao-hdr-wrap{position:static;box-shadow:none;background:#0A2240!important;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .ao-hdr-accent{display:none}
  .tab-nav,#tab-nav,.acts,#hd-btns,.add-asset-area,.btn-add-mat,.del-btn,.cta-section,.plans-section,.purpose-hero .tag{display:none!important}
  .app{max-width:100%}
  .page-body{padding:0 1rem!important}
  .acard-bd{display:block!important;background:white!important}
  .card,.acard,.mat-row{break-inside:avoid;border:1px solid #ccc!important;box-shadow:none!important}
  .mat-row{background:#f9f9f9!important}
  .acard{margin-bottom:16px!important}
  .tml-info{border:1px solid #ccc!important}
  select,input,textarea{border:1px solid #ccc!important;background:white!important}
  .section-panel,.section-panel.alt{background:white!important;border:none!important;margin:0!important;padding:.5rem 0!important}
  h1,h2{page-break-after:avoid}
  .acard{page-break-inside:avoid}
}

/* Tab navigation */
.tab-nav{background:#fff;border-bottom:2px solid #e0ddd6;position:sticky;top:68px;z-index:90;box-shadow:0 1px 6px rgba(0,0,0,.06)}.tab-nav-inner{max-width:700px;margin:0 auto;display:flex;padding-left:1.25rem}
.tab-btn{padding:11px 16px;font-size:12px;font-weight:700;background:none;border:none;border-bottom:3px solid transparent;margin-bottom:-2px;cursor:pointer;color:#888;border-radius:0;transition:color .15s,border-color .15s;letter-spacing:.02em}
.tab-btn:hover{color:#185FA5;background:none}
.tab-btn.active{color:#185FA5;border-bottom-color:#185FA5}

/* ── Home page rich content ─────────────────────────────────────────────── */
.purpose-hero{background:linear-gradient(135deg,#0A2240 0%,#0F3460 70%,#185FA5 100%);padding:1.75rem 1.25rem;color:#fff;margin:0 -1rem 0}
.purpose-hero h2{font-size:22px;font-weight:800;margin-bottom:.6rem;line-height:1.25;letter-spacing:-.02em}
.purpose-hero p{font-size:13px;line-height:1.75;opacity:.88;max-width:480px}
.purpose-hero .tag{display:inline-block;background:rgba(29,158,117,.25);border:1px solid rgba(29,158,117,.5);color:#5DECBA;padding:3px 11px;border-radius:99px;font-size:10px;font-weight:700;letter-spacing:.08em;margin-bottom:.85rem;text-transform:uppercase}

.section-panel{background:#fff;margin:0 -1rem;padding:1.5rem 1rem;border-bottom:1px solid #e8e5de}
.section-panel.alt{background:#f8f7f5}

.why-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:.25rem}
.why-card{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;padding:13px}
.why-card .icon{font-size:20px;margin-bottom:6px}
.why-card h4{font-size:12.5px;font-weight:700;color:#0A2240;margin-bottom:4px}
.why-card p{font-size:11.5px;color:#666;line-height:1.55}

.hierarchy{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;overflow:hidden;margin-bottom:.25rem}
.hier-row{display:flex;align-items:center;gap:12px;padding:10px 14px;border-bottom:1px solid #ebe8e0;transition:background .15s}
.hier-row:hover{background:#f0eff0}
.hier-row:last-child{border-bottom:none}
.hier-num{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;color:#fff}
.hier-lbl{font-size:13px;color:#0A2240;font-weight:600}
.hier-sub{font-size:11.5px;color:#777;margin-top:1px}

.resp-card{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;padding:13px 15px;margin-bottom:8px}
.resp-card h4{font-size:13px;font-weight:700;color:#0A2240;margin-bottom:5px;display:flex;align-items:center;gap:7px}
.resp-card p{font-size:12.5px;color:#555;line-height:1.65}

.top3-row{display:flex;gap:8px;margin-bottom:.25rem}
.top3-item{flex:1;background:#f8f7f5;border:2px solid #ebe8e0;border-radius:10px;padding:12px 10px;text-align:center}
.top3-item.hi{border-color:#185FA5;background:#EEF5FF}
.top3-item .num{font-size:22px;font-weight:800;color:#185FA5}
.top3-item .cat{font-size:11px;color:#444;margin-top:4px;line-height:1.4;font-weight:600}

/* How it works steps */
.how-steps{display:flex;flex-direction:column;gap:0;margin-bottom:.25rem}
.how-step{display:flex;align-items:flex-start;gap:13px;padding:13px 0;border-bottom:1px solid #ebe8e0}
.how-step:last-child{border-bottom:none}
.how-step-num{width:32px;height:32px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;flex-shrink:0;margin-top:1px}
.how-step-body h4{font-size:13px;font-weight:700;color:#0A2240;margin-bottom:3px}
.how-step-body p{font-size:12px;color:#666;line-height:1.55}

/* Plans section */
.plans-section{background:#fff;margin:0 -1rem;padding:1.25rem 1rem;border-bottom:1px solid #e8e5de}
.pitem{display:flex;align-items:center;gap:10px;padding:12px 14px;background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;margin-bottom:8px;cursor:pointer;transition:border-color .2s,background .15s}
.pitem:hover{border-color:#185FA5;background:#EEF5FF}
.pav{width:36px;height:36px;border-radius:50%;background:#E1F5EE;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#0F6E56;flex-shrink:0}

/* CTA section */
.cta-section{background:linear-gradient(135deg,#EEF5FF 0%,#E6F4F1 100%);margin:0 -1rem;padding:1.75rem 1rem;border-bottom:1px solid #d4e8f0;text-align:center}
.cta-section h3{font-size:18px;font-weight:800;color:#0A2240;margin-bottom:.5rem;letter-spacing:-.02em}
.cta-section p{font-size:13px;color:#555;line-height:1.6;margin-bottom:1.25rem;max-width:400px;margin-left:auto;margin-right:auto}
.btn-cta{display:block;width:100%;padding:15px;font-size:15px;font-weight:800;border-radius:10px;background:linear-gradient(135deg,#185FA5,#0F4C8A);color:#fff;border:none;cursor:pointer;letter-spacing:.01em;box-shadow:0 4px 16px rgba(24,95,165,.3);transition:transform .15s,box-shadow .15s}
.btn-cta:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(24,95,165,.4);background:linear-gradient(135deg,#185FA5,#0F4C8A)}
.btn-cta:active{transform:none}

/* FAQ accordion */
.faq-section{margin-bottom:1.5rem}
.faq-item{background:#fff;border:1px solid #e8e5de;border-radius:10px;margin-bottom:8px;overflow:hidden}
.faq-q{display:flex;align-items:flex-start;gap:10px;padding:13px 14px;cursor:pointer;transition:background .15s}
.faq-q:hover{background:#f9f8f6}
.faq-q-text{flex:1;font-size:13px;font-weight:600;color:#1a1a1a;line-height:1.4}
.faq-icon{font-size:16px;color:#aaa;flex-shrink:0;margin-top:1px;transition:transform .2s}
.faq-icon.open{transform:rotate(180deg)}
.faq-a{padding:0 14px 13px 38px;font-size:13px;color:#555;line-height:1.7;display:none}
.faq-a.open{display:block}
.faq-a strong{color:#1a1a1a}
.faq-tip{background:#E1F5EE;border-radius:6px;padding:7px 10px;font-size:12px;color:#0F6E56;margin-top:8px;font-weight:500}

/* Professional icon blocks */
.why-card .icon{width:36px;height:36px;margin-bottom:8px;display:flex;align-items:center;justify-content:center;background:#EEF5FF;border-radius:8px;flex-shrink:0}
.why-card .icon svg{width:18px;height:18px;stroke:#185FA5;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.resp-card h4 .icon-wrap{width:28px;height:28px;background:#EEF5FF;border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.resp-card h4 .icon-wrap svg{width:14px;height:14px;stroke:#185FA5;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}

/* Start plan link block */
.start-plan-cta{background:linear-gradient(90deg,#EEF5FF,#E6F4F1);border:1px solid #c5daf5;border-radius:10px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px;cursor:pointer;transition:border-color .2s,box-shadow .2s}
.start-plan-cta:hover{border-color:#185FA5;box-shadow:0 2px 12px rgba(24,95,165,.12)}
.start-plan-cta h4{font-size:14px;font-weight:800;color:#0A2240;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em}
.start-plan-cta p{font-size:12px;color:#555}
.start-plan-arrow{font-size:20px;color:#185FA5;font-weight:700;flex-shrink:0}

/* How steps horizontal */
.how-steps-h{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:1.25rem}
.how-step-card{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:10px;padding:14px 13px;position:relative}
.how-step-card .step-n{width:28px;height:28px;border-radius:50%;background:#185FA5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;margin-bottom:10px}
.how-step-card h4{font-size:12px;font-weight:700;color:#0A2240;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;line-height:1.3}
.how-step-card p{font-size:11px;color:#666;line-height:1.5}

/* Admin dashboard */
.admin-panel{padding:1.25rem 1rem}
.admin-login{background:#fff;border:1px solid #e8e5de;border-radius:12px;padding:1.5rem;max-width:340px;margin:2rem auto}
.admin-login h3{font-size:14px;font-weight:800;color:#0A2240;margin-bottom:.25rem;text-transform:uppercase;letter-spacing:.07em}
.admin-login p{font-size:12px;color:#888;margin-bottom:1rem}
.admin-table{width:100%;border-collapse:collapse;font-size:12px}
.admin-table th{background:#0A2240;color:#fff;padding:9px 10px;text-align:left;font-weight:700;font-size:11px;letter-spacing:.05em;text-transform:uppercase}
.admin-table td{padding:9px 10px;border-bottom:1px solid #e8e5de;color:#333;vertical-align:top}
.admin-table tr:hover td{background:#f5f8ff}
.admin-stat{display:inline-block;padding:2px 8px;border-radius:99px;font-size:10px;font-weight:700}

/* Audit trail */
.audit-log{background:#f8f7f5;border:1px solid #ebe8e0;border-radius:8px;padding:10px 13px;margin-bottom:10px}
.audit-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid #f0ede8;font-size:11.5px}
.audit-row:last-child{border-bottom:none}
.audit-dot{width:7px;height:7px;border-radius:50%;background:#185FA5;flex-shrink:0}
.audit-who{font-weight:600;color:#0A2240;min-width:100px}
.audit-what{color:#666;flex:1}
.audit-when{color:#aaa;font-size:10.5px;white-space:nowrap}
.import-zone{border:2px dashed #c5daf5;border-radius:10px;padding:1.25rem;text-align:center;background:#EEF5FF;margin-bottom:1rem;cursor:pointer;transition:border-color .2s}
.import-zone:hover{border-color:#185FA5}
.import-zone p{font-size:12px;color:#555;margin-top:.4rem}

.plan-id-badge{display:flex;align-items:center;gap:12px;background:#EEF9F4;border:2px solid #b2e8d2;border-radius:10px;padding:14px 16px;margin-top:10px}
.plan-id-code{font-family:monospace;font-size:17px;font-weight:800;color:#0A2240;letter-spacing:.08em;flex:1}
.plan-id-lbl{font-size:10px;font-weight:700;color:#0F6E56;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px}
.plan-id-copy-btn{background:#0F6E56;color:#fff;border:none;border-radius:6px;padding:7px 14px;font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
.plan-id-copy-btn:hover{background:#0a5a47}
.retrieve-box{background:#fff;border:1.5px solid #e0ddd6;border-radius:10px;padding:1.25rem;margin-bottom:1rem}
.retrieve-box h4{font-size:12px;font-weight:800;color:#0A2240;text-transform:uppercase;letter-spacing:.07em;margin-bottom:.4rem}
.retrieve-box p{font-size:12px;color:#666;margin-bottom:.75rem;line-height:1.55}
.retrieve-row{display:flex;gap:8px}
.retrieve-row input{flex:1;font-family:monospace;font-size:14px;letter-spacing:.05em}
.retrieve-row button{white-space:nowrap;padding:8px 16px;background:#185FA5;color:#fff;border-color:#185FA5;font-weight:700}

// ── Plan ID system ────────────────────────────────────────────────────────────
function planCode(id){
  const ch=(id||'').replace(/[^a-z0-9]/gi,'').toUpperCase().padEnd(8,'0');
  return 'AO27-'+ch.slice(0,4)+'-'+ch.slice(4,8);
}
function findByCode(code){
  const n=code.trim().toUpperCase().replace(/\s/g,'');
  return storageLoadAll().find(p=>planCode(p.id)===n)||null;
}
function copyCode(el){
  const code=el.getAttribute('data-code');
  if(!code)return;
  navigator.clipboard.writeText(code).then(()=>showToast('Plan ID copied'))
    .catch(()=>showToast('Your ID: '+code));
}

// ── Plan storage abstraction ──────────────────────────────────────────────────
// Swap this object's two methods to change the backend.
// localStorage is always used as an offline fallback.
const planDB = {
  async save(plan) {
    // Always save locally first (instant, offline-safe)
    storageSave(plan);

    if (!sb) {
      // Supabase not configured - localStorage only
      return { ok: true, source: 'local' };
    }
    try {
      const { error } = await sb.from('plans').upsert({
        id:         plan.id,
        plan_code:  planCode(plan.id),
        data:       plan,
        business:   plan.profile.businessName || '',
        owner:      plan.profile.ownerName    || '',
        role:       plan.profile.role         || '',
      }, { onConflict: 'id' });
      if (error) throw error;
      return { ok: true, source: 'cloud' };
    } catch(err) {
      console.warn('Supabase save failed, plan saved locally:', err.message);
      return { ok: true, source: 'local', warning: err.message };
    }
  },

  async loadById(code) {
    const normalised = code.trim().toUpperCase().replace(/\s/g,'');
    if (sb) {
      try {
        const { data, error } = await sb
          .from('plans')
          .select('data')
          .eq('plan_code', normalised)
          .single();
        if (data?.data) return data.data;
      } catch(err) {
        console.warn('Supabase lookup failed, trying local:', err.message);
      }
    }
    // Fallback to localStorage
    return findByCode(normalised);
  }
};

async function retrievePlan(){
  const inp=document.getElementById('retrieve-input');
  const msg=document.getElementById('retrieve-msg');
  const btn=document.querySelector('.retrieve-row button');
  if(!inp)return;
  const code=inp.value.trim().toUpperCase();
  if(code.length<9){
    if(msg){msg.textContent='Enter a full Plan ID (format: AO27-XXXX-XXXX)';msg.style.color='#A32D2D';}
    return;
  }
  if(msg){msg.textContent=SUPABASE_READY?'Searching cloud...':'Searching local plans...';msg.style.color='#888';}
  if(btn){btn.disabled=true;btn.textContent='Loading...';}
  try{
    const plan=await planDB.loadById(code);
    if(plan){
      S.plan=JSON.parse(JSON.stringify(plan));
      S.screen='form';S.plan.step=0;
      showToast('Plan loaded');render();
    } else {
      if(msg){
        msg.textContent=SUPABASE_READY
          ?'Plan not found in cloud or local storage. Check your Plan ID.'
          :'Plan not found on this device. Configure Supabase for cross-device access, or import your XLS.';
        msg.style.color='#A32D2D';
      }
    }
  } finally {
    if(btn){btn.disabled=false;btn.textContent='Load plan';}
  }
}


function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2)}
function fmtDate(ts){if(!ts)return'never';return new Date(ts).toLocaleDateString('en-AU',{day:'numeric',month:'short',year:'numeric'})}
function mkOpts(arr,val,ph){return(ph?`<option value="">${esc(ph)}</option>`:'')+arr.map(v=>`<option${v===val?' selected':''}>${esc(v)}</option>`).join('')}
function calcScore(assets){
  const allMats=(assets||[]).flatMap(a=>a.materials||[]);
  const f=allMats.filter(m=>m.stat);
  const lan=f.filter(m=>m.stat==='Landfill').length;
  const tot=f.length;
  return{total:tot,landfill:lan,nonLandfill:tot-lan,pct:tot>0?Math.round((tot-lan)/tot*100):0};
}
// Per-asset circularity summary for header badge
function assetCirc(a){
  const withStat=(a.materials||[]).filter(m=>m.stat);
  if(!withStat.length)return'';
  const nonLan=withStat.filter(m=>m.stat!=='Landfill').length;
  const cl=nonLan===withStat.length?'#1D9E75':nonLan===0?'#dc2626':'#EF9F27';
  return`<span style="font-size:10px;font-weight:700;color:${cl};flex-shrink:0">${nonLan}/${withStat.length}&nbsp;♻</span>`;
}
function fillClr(pct){return pct>=80?'#1D9E75':pct>=50?'#EF9F27':'#E24B4A'}
function statBdg(s){if(!s)return'';const m={'Reuse \u2013 Next AO':'gr','Reuse \u2013 Other Event / Client':'tl','Recycle':'bl','Repurpose':'pu','Landfill':'re','TBC \u2013 decide later':'gy'};return`<span class="bdg ${m[s]||'gy'}">${esc(s)}</span>`}

// ── TML Helpers ───────────────────────────────────────────────────────────────
function renderTMLOptions(selectedRef){
  const groups={};
  for(const t of TML){if(!groups[t.cat])groups[t.cat]=[];groups[t.cat].push(t)}
  let h='';
  for(const[cat,items]of Object.entries(groups)){
    h+=`<optgroup label="${esc(cat)}">`;
    for(const t of items){
      const icon=t.status==='yes'?'✓':t.status==='no'?'✗':'~';
      h+=`<option value="${esc(t.ref)}"${t.ref===selectedRef?' selected':''}>${icon} [${esc(t.ref)}] ${esc(t.name)}</option>`;
    }
    h+='</optgroup>';
  }
  return h;
}

function renderTMLInfo(ref){
  if(!ref||ref==='OTHER')return'';
  const t=TML.find(x=>x.ref===ref);
  if(!t)return'';
  const cls=t.status==='yes'?'tml-info-yes':t.status==='no'?'tml-info-no':'tml-info-maybe';
  const icon=t.status==='yes'?'♻':t.status==='no'?'⚠':'~';
  const recLabel=t.rec==='Yes'?'AO Recommended':t.rec==='No'?'Limit / Not Recommended':'Conditional / TBC';
  return`<div class="tml-info ${cls}"><span class="tml-info-icon">${icon}</span><div><strong><span class="tml-ref-badge">${esc(t.ref)}</span>${esc(recLabel)}</strong><br>${esc(t.circ)}</div></div>`;
}

// ── Storage helpers ───────────────────────────────────────────────────────────
function storageLoadAll(){
  try{
    const keys=Object.keys(localStorage).filter(k=>k.startsWith(STORAGE_PREFIX));
    const ps=keys.map(k=>{try{return JSON.parse(localStorage.getItem(k))}catch(e){return null}}).filter(Boolean);
    return ps.sort((a,b)=>(b.savedAt||0)-(a.savedAt||0));
  }catch(e){return[]}
}
function storageSave(plan){
  try{plan.savedAt=Date.now();localStorage.setItem(STORAGE_PREFIX+plan.id,JSON.stringify(plan));return true}catch(e){return false}
}
function storageDel(id){
  try{localStorage.removeItem(STORAGE_PREFIX+id);return true}catch(e){return false}
}

// Migrate old formats to current structure
function migratePlan(p){
  // Very old: plan.materials array
  if(!p.assets&&p.materials&&Array.isArray(p.materials)){
    p.assets=p.materials.map(m=>({
      id:m.id||uid(),expanded:false,prec:m.prec||'',precCustom:'',
      assetName:m.name||(m.cat?m.cat.split('(')[0].trim():'Asset'),desc:m.desc||'',
      materials:[{id:uid(),cat:m.cat||'',app:m.app||'',tmlRef:m.tmlRef||'',name:m.name||'',vol:m.vol||'',vunit:m.vunit||'sqm',stat:m.stat||'',outcome:m.outcome||''}]
    }));
    delete p.materials;
  }
  delete p.comments;
  // v4/v5: stat/outcome were on asset, migrate to each material
  if(p.assets){
    for(const a of p.assets){
      for(const m of(a.materials||[])){
        if(m.stat===undefined)m.stat=(a.stat||'');
        if(m.outcome===undefined)m.outcome=(a.outcome||'');
      }
      delete a.stat;delete a.outcome;
    }
  }
  return p;
}

function switchTab(tab){
  S.tab=tab;
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('tab-home').classList.toggle('active',tab==='home');
  document.getElementById('tab-plan').classList.toggle('active',tab==='plan');
  document.getElementById('tab-faq').classList.toggle('active',tab==='faq');
  document.getElementById('tab-admin').classList.toggle('active',tab==='admin');
  if(tab==='home')renderHome();
  else if(tab==='plan')renderPlanTab();
  else if(tab==='admin')renderAdmin();
  else renderFAQ();
}

function render(){
  if(S.screen==='loading'){document.getElementById('main').innerHTML='<div style="padding:2rem;text-align:center;color:#888;font-size:13px">Loading...</div>';return}
  const tabNav=document.getElementById('tab-nav');
  tabNav.style.display='';
  if(S.screen==='home'){
    if(!S.tab)S.tab='home';
    // Sync tab active states
    ['home','plan','faq','admin'].forEach(t=>{
      const el=document.getElementById('tab-'+t);
      if(el)el.classList.toggle('active',t===S.tab);
    });
    if(S.tab==='faq')renderFAQ();
    else if(S.tab==='plan')renderPlanTab();
    else if(S.tab==='admin')renderAdmin();
    else renderHome();
  } else {
    // Form view: keep tabs, highlight "Create a materials plan"
    ['home','plan','faq','admin'].forEach(t=>{
      const el=document.getElementById('tab-'+t);
      if(el)el.classList.toggle('active',t==='plan');
    });
    renderForm();
  }
}

function exportCSV(){
  const plans=storageLoadAll();
  const rows=[['Business','Owner','Role','Email','Date Saved','Asset','Precinct','Material','TML Ref','Volume','Unit','Status','Outcome']];
  for(const p of plans){
    for(const a of (p.assets||[])){
      for(const m of (a.materials||[])){
        rows.push([
          p.profile.businessName||'',p.profile.ownerName||'',p.profile.role||'',p.profile.email||'',
          p.savedAt?new Date(p.savedAt).toLocaleDateString('en-AU'):'',
          a.assetName||'',
          a.prec||'',
          m.name||'',m.tmlRef||'',m.vol||'',m.vunit||'',m.stat||'',m.outcome||''
        ]);
      }
    }
  }
  const csv=rows.map(r=>r.map(v=>'"'+(String(v).replace(/"/g,'""'))+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='AO27_Materials_Plans.csv';a.click();
  URL.revokeObjectURL(url);
}

  const sn=['About you','Assets & Materials','Summary'];
  const segs=sn.map((_,i)=>`<div class="seg ${i<step?'done':i===step?'active':''}"></div>`).join('');
  const lbls=sn.map((n,i)=>`<div class="plbl ${i<step?'done':i===step?'active':''}">${n}</div>`).join('');
  let c=`<div style="margin-bottom:1.25rem"><div class="prog-segs">${segs}</div><div class="prog-lbls">${lbls}</div></div>`;
  if(isEg)c+=`<div style="background:#FAEEDA;border-radius:8px;padding:9px 12px;font-size:12px;color:#854F0B;margin-bottom:1rem;display:flex;align-items:center;gap:8px"><span>&#128196; This is an example plan only.</span></div>`;
  if(step===0)c+=stepAbout(plan);
  else if(step===1)c+=stepAssets(plan);
  else c+=stepSummary(plan);
  document.getElementById('main').innerHTML=c;
}

function refreshAssets(){

    }).join('');

    return '<div style="padding:10px 0;border-bottom:1px solid #e8e5de"><div style="display:flex;align-items:center;gap:7px;margin-bottom:6px"><span style="font-size:11px;color:#aaa;font-weight:700">#'+(idx2+1)+'</span>'+precBdg+'<span style="font-size:13px;font-weight:600;flex:1">'+esc(a.assetName||'Unnamed asset')+'</span>'+assetCirc(a)+'</div>'+descHtml+'<div class="smat-list">'+matList+'</div></div>';

  h+='<div class="g2" style="margin-top:10px"><div><div style="font-size:12px;color:#888">Role</div><div style="font-size:14px;margin-top:2px">'+(esc(p.role)||'-')+'</div></div><div><div style="font-size:12px;color:#888">Date</div><div style="font-size:14px;margin-top:2px">'+(esc(p.date)||'-')+'</div></div></div>';

  h+=lastEditedHtml+storageHtml;

  h+='<div class="metg"><div class="met"><div class="mval">'+allMats.length+'</div><div class="mlbl">Total materials</div></div><div class="met"><div class="mval" style="color:'+cl+'">'+(sc.total>0?sc.pct+'%':'-')+'</div><div class="mlbl">Diverted from landfill</div></div><div class="met"><div class="mval" style="color:#A32D2D">'+sc.landfill+'</div><div class="mlbl">To landfill</div></div></div>';
  h+=circBody;
  h+='</div>';
  if(allMats.length&&stRows)h+='<div class="card"><div class="sechd" style="margin-top:0">Materials by expected status</div>'+stRows+'</div>';
  h+='<div class="card"><div class="sechd" style="margin-top:0">AO Target Materials coverage</div><div class="g2" style="margin-bottom:'+(customMats.length?'8px':'0')+'"><div class="met"><div class="mval" style="color:#185FA5">'+tmlMats.length+'</div><div class="mlbl">From AO Target List</div></div><div class="met"><div class="mval" style="color:#888">'+customMats.length+'</div><div class="mlbl">Custom / unlisted</div></div></div>'+customHtml+'</div>';
  h+=flaggedBlock;

}

function triggerImport(){const el=document.getElementById('import-xls-input');if(el)el.click();}

function importPlanXLS(input){
  const file=input.files[0];
  if(!file){return;}

  if(typeof XLSX==='undefined'){showToast('Export library not loaded yet. Please try again.');input.value='';return;}

  const reader=new FileReader();
  reader.onload=function(e){
    try{
      const data=new Uint8Array(e.target.result);
      const wb=XLSX.read(data,{type:'array',cellStyles:true,raw:false});
      const ws=wb.Sheets[wb.SheetNames[0]];

      const gv=(addr)=>{const cell=ws[addr];return cell?(cell.v!==undefined&&cell.v!==null?String(cell.v).trim():''):'';};

      // Validate it's an AO plan export
      const title=gv('A1');
      if(!title.includes('AO27')){
        showToast('File not recognised as an AO27 Materials Plan.');
        input.value='';return;
      }

      // Extract plan ID from A2 (format: "PLAN_ID:xxxxx")
      const idRow=gv('A2');
      const existingId=idRow.startsWith('PLAN_ID:')?idRow.slice(8).trim():null;

      // Find existing plan or create new
      let plan=null;
      let isUpdate=false;
      if(existingId){
        const stored=S.plans.find(p=>p.id===existingId);
        if(stored){plan=JSON.parse(JSON.stringify(stored));isUpdate=true;}
      }
      if(!plan)plan=newPlan();
      if(existingId&&!isUpdate)plan.id=existingId; // preserve ID for new-to-this-device

      // Business details
      plan.profile.businessName = gv('B4');
      plan.profile.ownerName    = gv('D4');
      plan.profile.role         = gv('B5');
      plan.profile.email        = gv('D5');
      plan.profile.date         = gv('B6');
      plan.profile.editorName   = gv('B7');
      plan.lastEditedBy         = gv('B7');
      plan.profile.wasteTarget  = gv('B10');
      plan.profile.reuseTarget  = gv('B11');
      plan.profile.storageDetails=gv('B12');

      // Parse material rows 16 onwards
      const assetMap={};
      const assetOrder=[];
      let r=16;
      while(true){
        const assetNum=gv('A'+r);
        // Stop on first truly empty row after data
        if(!assetNum&&!gv('B'+r)&&!gv('C'+r)&&r>20)break;
        if(!assetNum){r++;if(r>200)break;continue;}

        const prec     =gv('B'+r);
        const assetName=gv('C'+r);
        const desc     =gv('D'+r);
        const matNum   =gv('E'+r);
        const tmlRef   =gv('F'+r);
        const matName  =gv('G'+r);
        const app      =gv('H'+r);
        const vol      =gv('I'+r);
        const vunit    =gv('J'+r)||'sqm';
        const stat     =gv('K'+r);
        const outcome  =gv('L'+r);

        if(!assetMap[assetNum]){
          assetMap[assetNum]={id:uid(),expanded:false,prec:prec,precCustom:'',
            assetName:assetName,desc:desc,materials:[]};
          assetOrder.push(assetNum);
        }
        assetMap[assetNum].materials.push(
          {id:uid(),cat:'',app:app,tmlRef:tmlRef,name:matName,
           vol:vol,vunit:vunit,stat:stat,outcome:outcome}
        );
        r++;
      }
      plan.assets=assetOrder.map(n=>assetMap[n]);

      // Parse audit rows 53 onwards
      const existingAudit=plan.audit||[];
      let arow=53;
      const importedAudit=[];
      while(arow<200){
        const who=gv('A'+arow);
        const action=gv('B'+arow);
        if(!who&&!action)break;
        importedAudit.push({who,action:action||'Updated plan',when:0});
        arow++;
      }
      // Merge: keep existing audit, add import notice
      plan.audit=existingAudit;
      plan.lastEditedAt=Date.now();
      plan.lastEditedBy=plan.profile.editorName||plan.profile.ownerName||'Unknown';
      if(!plan.audit)plan.audit=[];
      plan.audit.push({
        who:plan.lastEditedBy,
        action:isUpdate?'Updated plan from XLS import':'Imported from XLS',
        when:Date.now()
      });

      // Save and load
      storageSave(plan);
      const idx=S.plans.findIndex(p=>p.id===plan.id);
      if(idx>=0)S.plans[idx]=JSON.parse(JSON.stringify(plan));
      else S.plans.unshift(JSON.parse(JSON.stringify(plan)));

      S.plan=plan;
      S.screen='form';
      S.plan.step=2; // Go to summary to review
      showToast(isUpdate?'Plan updated from XLS':'Plan imported from XLS');
      render();
    }catch(err){
      console.error('Import error:',err);
      showToast('Import failed - check the file format');
    }
    input.value='';
  };
  reader.readAsArrayBuffer(file);
}



function exportPlanXLS(){
  if(typeof XLSX==='undefined'){showToast('Loading export library...');return;}
  const plan=S.plan;
  const p=plan.profile;
  const assets=plan.assets||[];

  // Load template (preserves all yellow fills and formatting)
  const templateBytes=Uint8Array.from(atob(XLSX_TEMPLATE_B64),ch=>ch.charCodeAt(0));
  const wb=XLSX.read(templateBytes,{type:'array',cellStyles:true});
  const ws=wb.Sheets[wb.SheetNames[0]];

  // Helper: set cell value only (styles already in template)
  const set=(addr,val)=>{
    if(!ws[addr])ws[addr]={t:'s',v:''};
    if(val===null||val===undefined)val='';
    if(typeof val==='number'){ws[addr].t='n';ws[addr].v=val;ws[addr].w=String(val);}
    else{ws[addr].t='s';ws[addr].v=String(val);ws[addr].w=String(val);}
  };

  // Row 2: embed plan ID for re-import matching
  const xlsCode=planCode(plan.id);
  set('A2','PLAN_ID:'+plan.id);
  set('D2','Your Plan ID: '+xlsCode);

  // Business details
  set('B4',p.businessName||'');
  set('D4',p.ownerName||'');
  set('B5',p.role||'');
  set('D5',p.email||'');
  set('B6',p.date||'');
  set('B7',plan.lastEditedBy||p.editorName||p.ownerName||'');
  set('D7',plan.lastEditedAt?new Date(plan.lastEditedAt).toLocaleDateString('en-AU'):(p.date||''));

  // Waste targets
  set('B10',p.wasteTarget||'');
  set('B11',p.reuseTarget||'');
  set('B12',p.storageDetails||'');

  // Material rows starting at row 16
  let row=16;
  for(let ai=0;ai<assets.length;ai++){
    const a=assets[ai];
    const prec=a.prec||'';
    for(let mi=0;mi<(a.materials||[]).length;mi++){
      const m=a.materials[mi];
      const addr=r=>String.fromCharCode(64+r)+row;
      // Ensure row exists (template has 35 blank rows; extend if needed)
      if(!ws['A'+row]){
        for(let col=1;col<=12;col++){
          const a2=String.fromCharCode(64+col)+row;
          ws[a2]={t:'s',v:'',s:{fill:{fgColor:{rgb:'FFFFFFCC'},patternType:'solid'}}};
        }
      }
      set('A'+row, ai+1);
      set('B'+row, prec);
      set('C'+row, a.assetName||'');
      set('D'+row, a.desc||'');
      set('E'+row, mi+1);
      set('F'+row, m.tmlRef||'');
      set('G'+row, m.name||'');
      set('H'+row, m.app||'');
      set('I'+row, m.vol||'');
      set('J'+row, m.vunit||'sqm');
      set('K'+row, m.stat||'');
      set('L'+row, m.outcome||'');
      row++;
    }
  }

  // Update sheet range
  const lastDataRow=Math.max(50, row-1);
  ws['!ref']='A1:L'+Math.max(70,lastDataRow+20);

  // Audit history starting at row 53
  let arow=53;
  for(const e of (plan.audit||[]).slice().reverse()){
    set('A'+arow, e.who||'');
    set('B'+arow, e.action||'');
    set('C'+arow, e.when?new Date(e.when).toLocaleDateString('en-AU'):'');
    arow++;
  }

  const fname=(p.businessName||'AO27_Plan').replace(/[^a-z0-9]/gi,'_')+'_Materials_Plan.xlsx';
  XLSX.writeFile(wb, fname, {bookType:'xlsx', cellStyles:true});
}


function goHome(){S.screen='home';render()}
function goPlan(id){const p=S.plans.find(x=>x.id===id);if(p){S.plan=JSON.parse(JSON.stringify(p));S.screen='form';render()}}
function createNewPlan(){S.plan=newPlan();S.screen='form';render()}
function loadExample(){S.plan=Object.assign(examplePlan(),{_example:true});S.screen='form';render()}
function goNext(){if(S.plan.step===0)saveAbout();if(S.plan.step<2){S.plan.step++;render()}}
function goPrev(){if(S.plan.step>0){S.plan.step--;render()}}
function deletePlan(id){if(!confirm('Delete this plan? This cannot be undone.'))return;storageDel(id);S.plans=S.plans.filter(p=>p.id!==id);render();showToast('Plan deleted')}
function savePlan(){
  delete S.plan._example;
  const editor=S.plan.profile.editorName||S.plan.profile.ownerName||'Unknown';
  const now=Date.now();
  if(!S.plan.audit)S.plan.audit=[];
  if(!S.plan.createdAt)S.plan.createdAt=now;
  S.plan.lastEditedBy=editor;
  S.plan.lastEditedAt=now;
  S.plan.audit.push({who:editor,when:now,action:'Saved plan'});
  planDB.save(S.plan).then(res=>{
    const i=S.plans.findIndex(p=>p.id===S.plan.id);
    if(i>=0)S.plans[i]=JSON.parse(JSON.stringify(S.plan));
    else S.plans.unshift(JSON.parse(JSON.stringify(S.plan)));
    if(res.ok){
      showSavedModal(planCode(S.plan.id), res.source);
    } else {
      showToast('Save failed - please try again');
    }
  });
}

  m.style.cssText='position:fixed;inset:0;background:rgba(10,34,64,.5);z-index:999;display:flex;align-items:center;justify-content:center;padding:1rem';
  const inner=document.createElement('div');
  inner.style.cssText='background:#fff;border-radius:14px;padding:1.75rem;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25)';
  inner.innerHTML='<div style="text-align:center;margin-bottom:1.25rem">'
    +'<div style="width:48px;height:48px;background:#E1F5EE;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto .75rem;font-size:22px">&#10003;</div>'
    +'<div style="font-size:17px;font-weight:800;color:#0A2240;margin-bottom:.25rem">Plan saved</div>'
    +'<div style="font-size:13px;color:#666">Save your Plan ID to retrieve this plan on any device</div>'
    +'</div>'
    +'<div style="background:#EEF9F4;border:2px solid #b2e8d2;border-radius:10px;padding:14px 16px;margin-bottom:1rem;text-align:center">'
    +'<div style="font-size:10px;font-weight:700;color:#0F6E56;letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px">Your Plan ID</div>'
    +'<div style="font-family:monospace;font-size:26px;font-weight:800;color:#0A2240;letter-spacing:.1em">'+code+'</div>'
    +'</div>';
  const copyBtn=document.createElement('button');
  copyBtn.setAttribute('data-code',code);
  copyBtn.style.cssText='width:100%;padding:10px;background:#0F6E56;color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;cursor:pointer;margin-bottom:8px;font-family:inherit';
  copyBtn.textContent='Copy Plan ID';
  copyBtn.onclick=function(){copyCode(this);};
  const note=document.createElement('div');
  note.style.cssText='font-size:11.5px;color:#888;line-height:1.6;margin-bottom:1rem';
  note.innerHTML='Enter this ID on <strong>Create a materials plan</strong> to reload from any device. Also embedded in your XLS export.';
  const closeBtn=document.createElement('button');
  closeBtn.style.cssText='width:100%;padding:9px;background:#f5f5f3;color:#555;border:1px solid #ddd;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit';
  closeBtn.textContent='Close';
  closeBtn.onclick=function(){m.remove();};
  inner.appendChild(copyBtn);inner.appendChild(note);inner.appendChild(closeBtn);
  m.appendChild(inner);
  document.body.appendChild(m);
  // Show cloud/local indicator
  const srcNote=document.getElementById('save-source-note');
  if(srcNote){
    if(source==='cloud'){
      srcNote.innerHTML='<span style="color:#0F6E56;font-weight:700">Saved to cloud.</span> ';
    } else {
      srcNote.innerHTML='<span style="color:#854F0B;font-weight:700">Saved locally only'+(SUPABASE_READY?'':' (Supabase not configured)')+'.</span> ';
    }
  }
  m.addEventListener('click',function(e){if(e.target===m)m.remove();});
}

// ── Asset CRUD ────────────────────────────────────────────────────────────────
function addAsset(){
  S.plan.assets.push(newAsset({expanded:true}));
  refreshAssets();
  setTimeout(()=>{const els=document.querySelectorAll('.acard-bd');if(els.length)els[els.length-1].scrollIntoView({behavior:'smooth',block:'nearest'})},80);
}
function delAsset(aid){
  S.plan.assets=S.plan.assets.filter(a=>a.id!==aid);
  refreshAssets();
}
function toggleAsset(aid){
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  a.expanded=!a.expanded;
  const bd=document.getElementById('abd-'+aid);const arr=document.getElementById('arr-'+aid);
  if(bd)bd.style.display=a.expanded?'':'none';
  if(arr)arr.innerHTML=a.expanded?'&#9650;':'&#9660;';
}

function saveAsset(aid){
  const ok=storageSave(S.plan);
  if(ok){const i=S.plans.findIndex(p=>p.id===S.plan.id);if(i>=0)S.plans[i]=JSON.parse(JSON.stringify(S.plan));else S.plans.unshift(JSON.parse(JSON.stringify(S.plan)));showToast('Asset saved \u2713');}
  else showToast('Save failed - please try again');
}

// ── Asset-level field update ──────────────────────────────────────────────────
function upAsset(el){
  const aid=el.dataset.aid;const f=el.dataset.f;
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  a[f]=el.value;
  // Update header name
  const nm=document.querySelector('#ac-'+aid+' .aname');
  if(nm){const precLabel=a.prec||'';nm.textContent=a.assetName||precLabel||'New asset';}
  // Update score bar
  const assets=S.plan.assets||[];const sc=calcScore(assets);const cl=fillClr(sc.pct);
  const allMatsCount=assets.flatMap(a=>a.materials||[]).length;
  const sb=document.getElementById('score-bar');
  if(sb)sb.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px"><span>${assets.length} asset${assets.length!==1?'s':''} &middot; ${allMatsCount} material${allMatsCount!==1?'s':''} &middot; ${sc.nonLandfill} diverted from landfill</span><span style="font-weight:600;color:${cl}">${sc.total>0?sc.pct+'% circular':''}</span></div><div class="strack"><div class="sfill" style="width:${sc.pct}%;background:${cl}"></div></div>`;
}

// ── Material-level field update ───────────────────────────────────────────────
function upAssetMat(el){
  const aid=el.dataset.aid;const mid=el.dataset.mid;const f=el.dataset.f;
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  const m=a.materials.find(x=>x.id===mid);if(!m)return;
  m[f]=el.value;
  // Update material row header label
  const hd=document.querySelector('#mr-'+mid+' .mat-row-name');
  if(hd)hd.textContent=m.name||m.cat||'Material';
  // Refresh circ badge in asset header when stat changes
  if(f==='stat'){
    const circEl=document.querySelector('#ac-'+aid+' .acard-hd span[style*="color"]');
    if(circEl){const newCirc=assetCirc(a);const tmp=document.createElement('div');tmp.innerHTML=newCirc;if(tmp.firstChild)circEl.replaceWith(tmp.firstChild);}
    // Update score bar
    const assets=S.plan.assets||[];const sc=calcScore(assets);const cl=fillClr(sc.pct);
    const allMatsCount=assets.flatMap(x=>x.materials||[]).length;
    const sb=document.getElementById('score-bar');
    if(sb)sb.innerHTML=`<div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px"><span>${assets.length} asset${assets.length!==1?'s':''} &middot; ${allMatsCount} material${allMatsCount!==1?'s':''} &middot; ${sc.nonLandfill} diverted from landfill</span><span style="font-weight:600;color:${cl}">${sc.total>0?sc.pct+'% circular':''}</span></div><div class="strack"><div class="sfill" style="width:${sc.pct}%;background:${cl}"></div></div>`;
  }
}

// ── TML pick (within asset mat) ───────────────────────────────────────────────
function pickAssetMatTML(el){
  const aid=el.dataset.aid;const mid=el.dataset.mid;const val=el.value;
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  const m=a.materials.find(x=>x.id===mid);if(!m)return;

  if(val===''){
    m.tmlRef='';m.name='';
    refreshAssets();return;
  }
  if(val==='OTHER'){
    m.tmlRef='OTHER';m.name='';
    // Show field 7, hide TML info
    const f7=document.getElementById('f7-'+mid);if(f7)f7.style.display='';
    const hd=document.querySelector('#mr-'+mid+' .mat-row-name');if(hd)hd.textContent='Other material';
    return;
  }
  const t=TML.find(x=>x.ref===val);if(!t)return;
  m.tmlRef=val;m.name=t.name;m.cat=t.cat;
  refreshAssets();
}

// ── Asset material CRUD ───────────────────────────────────────────────────────
function addAssetMat(aid){
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  a.materials.push(newAssetMat());
  // Re-render just the materials section for this asset
  const mats=document.getElementById('mats-'+aid);
  if(mats){let h='';for(let j=0;j<a.materials.length;j++)h+=matRowHtml(aid,a.materials[j],j);mats.innerHTML=h;}
  // Update materials count label
  const lbl=document.querySelector('#ac-'+aid+' .mats-divider-lbl');
  if(lbl)lbl.textContent=`Materials in this asset (${a.materials.length})`;
  // Update mat badge in header
  const hd=document.querySelector('#ac-'+aid+' .acard-hd');
  const matBdgEl=hd?hd.querySelector('.bdg.gy'):null;
  if(matBdgEl&&a.materials.length>1)matBdgEl.textContent=`${a.materials.length} mats`;
  else if(!matBdgEl&&a.materials.length>1&&hd){const nb=document.createElement('span');nb.className='bdg gy';nb.style.fontSize='10px';nb.textContent=`${a.materials.length} mats`;hd.insertBefore(nb,hd.querySelector('.aname'));}
  // Scroll to new row
  setTimeout(()=>{const rows=mats?mats.querySelectorAll('.mat-row'):[];if(rows.length)rows[rows.length-1].scrollIntoView({behavior:'smooth',block:'nearest'})},50);
}

function delAssetMat(aid,mid){
  const a=S.plan.assets.find(x=>x.id===aid);if(!a)return;
  if(a.materials.length<=1){showToast('An asset needs at least one material. Delete the asset to remove it entirely.');return;}
  a.materials=a.materials.filter(m=>m.id!==mid);
  const mats=document.getElementById('mats-'+aid);
  if(mats){let h='';for(let j=0;j<a.materials.length;j++)h+=matRowHtml(aid,a.materials[j],j);mats.innerHTML=h;}
  const lbl=document.querySelector('#ac-'+aid+' .mats-divider-lbl');
  if(lbl)lbl.textContent=`Materials in this asset (${a.materials.length})`;
}
